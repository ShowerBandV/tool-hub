      <p style="color:var(--text-secondary);line-height:1.8;font-size:0.9rem;">歇后语是中国民间语言艺术的一种形式，由两部分组成：前半部分是形象比喻（谜面），后半部分是解释说明（谜底）。通常只说前半部分，后半部分留给听者意会。歇后语生动幽默，反映了劳动人民的生活智慧。方言则是地方文化的活化石，不同地区的方言表达各有特色，本工具收录了一些有趣的方言词汇和表达。</p>
    </div>

        '<div class="xiehouyu-category">📌 ' + item.cat + ' 歇后语</div>';

    window.copyResult = function(id) {
      const el = document.getElementById(id);
      const text = el._fullText || el.textContent;
      navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制'));
