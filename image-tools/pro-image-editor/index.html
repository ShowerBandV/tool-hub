<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼</text></svg>">
  <meta name="description" content="专业图片处理工具 — 背景压暗、文字消除、尺寸裁剪+水印，支持批量处理、多颜色导出、画笔修正。">
  <title>专业图片处理 - 背景压暗/文字消除/裁剪水印 · 图片盒子</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);overflow:hidden;display:flex;flex-direction:column;height:100vh;user-select:none}
    :root{--bg:#f0f2f5;--surface:#fff;--surface2:#f5f6fa;--border:#d0d7de;--text:#1e293b;--text2:#475569;--accent2:#3b82f6;--shadow:0 4px 16px rgba(0,0,0,0.08);--radius2:10px;--header-h:48px;--toolbar-h:44px;--params-h:58px;--colorbar-h:64px;--footer-h:52px}
    [data-theme="dark"]{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#e2e8f0;--text2:#94a3b8;--accent2:#60a5fa;--shadow:0 4px 16px rgba(0,0,0,0.4)}
    button{font-family:inherit;cursor:pointer;border:none;outline:none;background:var(--surface2);color:var(--text);border-radius:6px;padding:4px 12px;font-size:13px;display:inline-flex;align-items:center;gap:4px;border:1px solid transparent}
    button:hover{background:var(--border)}
    button.primary{background:var(--accent);color:#fff}
    button.primary:hover{background:var(--accent-dark)}
    input,select{font-family:inherit;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:13px;outline:none}
    input:focus,select:focus{border-color:var(--accent)}
    input[type="range"]{-webkit-appearance:none;background:var(--border);height:4px;border-radius:2px;padding:0}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:var(--surface2)}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    #app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
    #topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    #topbar h1{font-size:17px;font-weight:600;display:flex;align-items:center;gap:6px}
    #topbar h1 small{font-weight:400;font-size:12px;color:var(--text2)}
    #toolbar{display:flex;align-items:center;gap:4px;padding:0 16px;height:var(--toolbar-h);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
    #toolbar .tool-btn{padding:5px 14px;border-radius:16px;font-weight:500;font-size:13px;background:transparent;border:1px solid transparent}
    #toolbar .tool-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    #toolbar .spacer{flex:1}
    #params{display:flex;align-items:center;flex-wrap:nowrap;gap:8px 14px;padding:4px 16px;height:var(--params-h);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;font-size:13px}
    #params .group{display:flex;align-items:center;gap:4px;white-space:nowrap}
    #params .group label{color:var(--text2);font-size:12px}
    #params .group .val{min-width:28px;text-align:center;font-size:12px;color:var(--text2)}
    #params .group input[type="color"]{width:30px;height:26px;padding:0;border-radius:4px}
    .panel{display:none}.panel.active{display:flex;align-items:center;gap:8px 14px;flex-wrap:wrap}
    .wm-group{display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px;background:var(--surface2);padding:3px 10px;border-radius:6px;border:1px solid var(--border)}
    #main{display:flex;flex:1;min-height:0;background:var(--bg)}
    #fileList{width:190px;min-width:130px;max-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
    #fileList .header{display:flex;justify-content:space-between;align-items:center;padding:8px 10px 4px;font-size:13px;font-weight:500;border-bottom:1px solid var(--border);flex-shrink:0}
    #fileList .list{flex:1;overflow-y:auto;padding:4px}
    #fileList .list .item{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:6px;cursor:pointer;margin-bottom:2px}
    #fileList .list .item:hover{background:var(--surface2)}
    #fileList .list .item.active{background:var(--accent);color:#fff}
    #fileList .list .item img{width:32px;height:32px;object-fit:cover;border-radius:4px;border:1px solid var(--border);flex-shrink:0;background:#eee}
    #fileList .list .item .info{flex:1;overflow:hidden;font-size:12px}
    #fileList .list .item .info .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #fileList .list .item .del{opacity:0;background:transparent;color:var(--text2);padding:0 4px;font-size:13px}
    #fileList .list .item:hover .del{opacity:1}
    #fileList .dropzone{border:2px dashed var(--border);border-radius:6px;padding:14px 8px;text-align:center;font-size:12px;color:var(--text2);margin:4px;cursor:pointer}
    #fileList .dropzone.dragover{border-color:var(--accent);background:var(--info-light)}
    #imageDisplay{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0}
    #imageDisplay .canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;padding:6px}
    #imageDisplay .canvas-wrap canvas{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px;box-shadow:var(--shadow);background:#1a1a2e;cursor:crosshair}
    #viewControls{display:flex;align-items:center;gap:4px;padding:3px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;font-size:12px}
    #viewControls .vg{display:flex;gap:2px;background:var(--surface2);border-radius:6px;padding:2px}
    #viewControls .vg button{padding:2px 10px;font-size:12px;border-radius:4px;background:transparent}
    #viewControls .vg button.active{background:var(--accent);color:#fff}
    #viewControls .sep{width:1px;height:20px;background:var(--border);margin:0 4px}
    #colorBar{display:flex;align-items:center;gap:8px;padding:4px 16px;height:var(--colorbar-h);background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;overflow-x:auto}
    #colorBar .swatches{display:flex;gap:4px}
    #colorBar .swatch{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;flex-shrink:0;position:relative}
    #colorBar .swatch.active{border-color:var(--accent);transform:scale(1.06)}
    #colorBar .swatch .checkmark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:12px;text-shadow:0 1px 4px rgba(0,0,0,0.5);opacity:0}
    #colorBar .swatch.active .checkmark{opacity:1}
    #footer{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:0 16px;height:var(--footer-h);background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
    #footer .info{font-size:12px;color:var(--text2);margin-right:auto}
    #footer button{padding:5px 16px;font-weight:500}
    .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--text);padding:6px 20px;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.2);font-size:13px;z-index:999;opacity:0;pointer-events:none;border:1px solid var(--border)}
    .toast.show{opacity:1}
    @media(max-width:820px){#fileList{width:130px;min-width:90px}#params{height:auto;flex-wrap:wrap;padding:4px 10px}#colorBar{flex-wrap:wrap;height:auto;padding:4px 12px}}
  </style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>🖼 图片处理 <small>背景压暗 · 文字消除 · 尺寸裁剪</small></h1>
    <button id="themeToggle" style="background:transparent;font-size:16px;padding:2px 8px;">🌙</button>
  </div>
  <div id="toolbar">
    <button class="tool-btn active" data-tool="darken">🌙 背景压暗</button>
    <button class="tool-btn" data-tool="textrm">✏️ 文字消除</button>
    <button class="tool-btn" data-tool="crop">📐 尺寸裁剪</button>
    <span class="spacer"></span>
    <span style="font-size:12px;color:var(--text2);" id="toolStatus">就绪</span>
  </div>

  <div id="params">
    <div class="panel active" id="panel-darken">
      <div class="group"><label>纯色范围</label><input type="range" id="darkRange" min="10" max="100" value="70"><span class="val" id="darkRangeVal">70</span></div>
      <div class="group"><label>压暗强度</label><input type="range" id="darkStrength" min="0" max="200" value="100"><span class="val" id="darkStrengthVal">1.00</span></div>
      <div class="group"><label>顶部保护</label><input type="range" id="topProtect" min="0" max="100" value="0"><span class="val" id="topProtectVal">0%</span></div>
      <div class="group"><label>过渡柔边</label><input type="range" id="feather" min="0" max="20" value="5"><span class="val" id="featherVal">5</span></div>
      <div class="group"><label>保留纹理</label><input type="range" id="textureRetain" min="0" max="100" value="100"><span class="val" id="textureRetainVal">100%</span></div>
    </div>
    <div class="panel" id="panel-textrm">
      <div class="group"><label>修复方式</label><select id="repairMode"><option value="blend">四周混合</option><option value="solid">纯色采样</option><option value="blur">模糊采样</option></select></div>
      <div class="group"><label>采样宽度</label><input type="range" id="sampleWidth" min="2" max="40" value="12"><span class="val" id="sampleWidthVal">12</span></div>
      <div class="group"><label><input type="checkbox" id="showTextMask"> 显示蒙版</label></div>
      <div class="group"><button class="primary" id="autoDetectText">🔍 自动识别</button></div>
      <div class="group"><button id="applyTextAll">应用到全部</button></div>
      <div class="group"><button id="undoText">↩️ 撤销</button></div>
      <div class="group"><button id="clearText">清空选区</button></div>
    </div>
    <div class="panel" id="panel-crop">
      <div class="group"><label>模式</label><select id="cropMode"><option value="fill">填满</option><option value="fit">适配</option></select></div>
      <div class="group"><label>宽</label><input type="number" id="cropW" value="720" style="width:54px"></div>
      <div class="group"><label>高</label><input type="number" id="cropH" value="1280" style="width:54px"></div>
      <div class="group"><label>格式</label><select id="outFormat"><option value="jpg">JPG</option><option value="png">PNG</option></select></div>
      <div class="group"><label>质量</label><input type="range" id="outQuality" min="10" max="100" value="80"><span class="val" id="outQualityVal">80</span></div>
      <div class="group"><label>补边</label><input type="color" id="fillColor" value="#000000" style="width:28px;height:24px"></div>
      <div class="wm-group">
        <span style="font-weight:500;font-size:12px;">💧 水印</span>
        <label style="display:flex;align-items:center;gap:2px;font-size:12px;"><input type="checkbox" id="watermarkToggle"> 启用</label>
        <span style="font-size:12px;">文字</span>
        <input type="text" id="watermarkText" value="© 2026" style="width:60px;font-size:12px;padding:2px 6px;">
        <select id="watermarkPosition" style="font-size:12px;padding:2px 4px;width:50px;"><option value="右上">右上</option><option value="右下">右下</option><option value="左上">左上</option><option value="左下">左下</option></select>
        <label style="font-size:12px;">大小</label><input type="number" id="watermarkSize" value="32" style="width:36px;font-size:12px;">
        <input type="color" id="watermarkTextColor" value="#ffffff" style="width:24px;height:22px;">
        <input type="color" id="watermarkStrokeColor" value="#000000" style="width:24px;height:22px;">
        <span style="font-size:12px;">描边</span><input type="number" id="watermarkStrokeWidth" value="3" style="width:30px;font-size:12px;">
      </div>
    </div>
  </div>

  <div id="main">
    <div id="fileList">
      <div class="header"><span>📁 文件</span>
        <div><button id="addFilesBtn" style="font-size:12px;padding:2px 8px;">+</button><button id="clearAllBtn" style="font-size:12px;padding:2px 8px;">✕</button></div>
      </div>
      <div class="list" id="fileListContainer">
        <div class="dropzone" id="dropzone">📥 拖入图片或点击添加</div>
      </div>
    </div>
    <div id="imageDisplay">
      <div id="viewControls">
        <div class="vg"><button class="active" data-view="result">结果</button><button data-view="original">原图</button><button data-view="mask">蒙版</button><button data-view="compare">对比</button></div>
        <span class="sep"></span>
        <span style="font-size:12px;color:var(--text2);" id="imgInfo">未加载</span>
        <span class="sep"></span>
        <div id="toolActions">
          <button id="penAdd" class="primary" style="font-size:11px;padding:2px 8px;">➕ 加人变暗</button>
          <button id="penRemove" style="font-size:11px;padding:2px 8px;">➖ 保护不变</button>
          <button id="penEraser" style="font-size:11px;padding:2px 8px;">🧹 橡皮擦</button>
          <button id="penBox" style="font-size:11px;padding:2px 8px;">⬜ 框选</button>
          <label style="font-size:11px;display:flex;align-items:center;gap:2px;">画笔 <input type="range" id="brushSize" min="2" max="60" value="16" style="width:50px;"><span id="brushSizeVal" style="font-size:11px;color:var(--text2);">16</span></label>
        </div>
        <span class="sep"></span>
        <button id="resetViewBtn" style="font-size:11px;padding:2px 8px;">🔄 视图</button>
      </div>
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="mainCanvas"></canvas>
      </div>
    </div>
  </div>

  <div id="colorBar">
    <span style="font-size:13px;font-weight:500;">🎨 暗部颜色</span>
    <div class="swatches" id="colorSwatches"></div>
    <div><input type="color" id="colorPicker" value="#1a1a2e" style="width:28px;height:28px;border:none;padding:0;border-radius:50%;"></div>
    <div><button id="addColorBtn" style="font-size:11px;padding:2px 6px;">+添加</button></div>
    <div style="margin-left:auto;display:flex;gap:4px;">
      <button id="selectAllColors" style="font-size:11px;padding:2px 8px;">全选</button>
      <button id="deselectAllColors" style="font-size:11px;padding:2px 8px;">取消</button>
    </div>
  </div>

  <div id="footer">
    <span class="info" id="footerInfo">就绪 · 共 0 张</span>
    <button class="primary" id="downloadCurrent">⬇ 下载当前</button>
    <button class="primary" id="downloadBatch">📦 批量下载</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="../../assets/js/common.js"></script>
<script>
(function(){
'use strict';
const state={images:[],currentIndex:-1,tool:'darken',view:'result',theme:'light',colors:[{hex:'#1a1a2e',selected:true},{hex:'#2d1b3d',selected:true},{hex:'#1a2a4a',selected:true},{hex:'#2d1b1b',selected:true},{hex:'#1a1a1a',selected:true}],currentColorHex:'#1a1a2e',penMode:null,brushSize:16,isDrawing:false,_nextId:0};
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const D={canvas:$('#mainCanvas'),wrap:$('#canvasWrap'),fileList:$('#fileListContainer'),dropzone:$('#dropzone'),toolBtns:$$('.tool-btn'),swatches:$('#colorSwatches'),colorPicker:$('#colorPicker'),addColorBtn:$('#addColorBtn'),selectAllColors:$('#selectAllColors'),deselectAllColors:$('#deselectAllColors'),downloadCurrent:$('#downloadCurrent'),downloadBatch:$('#downloadBatch'),footerInfo:$('#footerInfo'),imgInfo:$('#imgInfo'),toolStatus:$('#toolStatus'),themeToggle:$('#themeToggle'),addFilesBtn:$('#addFilesBtn'),clearAllBtn:$('#clearAllBtn'),resetViewBtn:$('#resetViewBtn'),toast:$('#toast'),
darkRange:$('#darkRange'),darkStrength:$('#darkStrength'),topProtect:$('#topProtect'),feather:$('#feather'),textureRetain:$('#textureRetain'),repairMode:$('#repairMode'),sampleWidth:$('#sampleWidth'),showTextMask:$('#showTextMask'),cropMode:$('#cropMode'),cropW:$('#cropW'),cropH:$('#cropH'),outFormat:$('#outFormat'),outQuality:$('#outQuality'),fillColor:$('#fillColor'),watermarkToggle:$('#watermarkToggle'),watermarkText:$('#watermarkText'),watermarkPosition:$('#watermarkPosition'),watermarkSize:$('#watermarkSize'),watermarkTextColor:$('#watermarkTextColor'),watermarkStrokeColor:$('#watermarkStrokeColor'),watermarkStrokeWidth:$('#watermarkStrokeWidth'),brushSize:$('#brushSize'),penAdd:$('#penAdd'),penRemove:$('#penRemove'),penEraser:$('#penEraser'),penBox:$('#penBox'),autoDetectText:$('#autoDetectText'),applyTextAll:$('#applyTextAll'),undoText:$('#undoText'),clearText:$('#clearText')};
[['darkRange','darkRangeVal'],['darkStrength','darkStrengthVal'],['topProtect','topProtectVal'],['feather','featherVal'],['textureRetain','textureRetainVal'],['sampleWidth','sampleWidthVal'],['outQuality','outQualityVal']].forEach(([id,v])=>{const el=D[id],vl=document.getElementById(v);if(el&&vl)el.addEventListener('input',()=>{vl.textContent=el.value;renderCanvas()})});
const wmInputs=['watermarkToggle','watermarkText','watermarkPosition','watermarkSize','watermarkTextColor','watermarkStrokeColor','watermarkStrokeWidth','cropMode','cropW','cropH','outFormat','outQuality','fillColor'];
wmInputs.forEach(id=>{const el=D[id];if(el)el.addEventListener('input',()=>{if(id==='watermarkSize'){}renderCanvas()})});

function toast(msg){const e=D.toast;e.textContent=msg;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2000)}
function getSelectedColors(){return state.colors.filter(c=>c.selected).map(c=>c.hex)}
function getCurrentImage(){return state.images[state.currentIndex]||null}
function hexToRgb(h){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:{r:0,g:0,b:0}}
function loadImg(src){const i=new Image();i.src=src;return i}
function fmtVal(v){return v<10?'0'+v:''+v}

async function addFiles(files){let added=0
  for(const f of files){if(!f.type.startsWith('image/'))continue;const r=new FileReader();const p=new Promise((res,rej)=>{r.onload=e=>{const i=new Image();i.onload=()=>{state.images.push({id:state._nextId++,file:f,name:f.name,dataURL:e.target.result,width:i.width,height:i.height,checked:true,textSelections:[],_textHistory:[]});res()};i.onerror=rej;i.src=e.target.result}});r.readAsDataURL(f);await p;added++}
  if(!added){toast('无有效图片');return}
  if(state.currentIndex<0)state.currentIndex=0;renderFileList();renderCanvas();updateFooter();toast('已导入 '+added+' 张')
}

function renderFileList(){const c=D.fileList;c.querySelectorAll('.item').forEach(el=>el.remove());const dz=D.dropzone;if(!state.images.length){dz.style.display='block';return}
dz.style.display='none';state.images.forEach((img,i)=>{const d=document.createElement('div');d.className='item'+(i===state.currentIndex?' active':'');d.dataset.idx=i;d.innerHTML='<img src="'+img.dataURL+'" alt="'+img.name+'"><div class="info"><div class="name">'+img.name+'</div><div class="name" style="font-size:10px;color:var(--text2)">'+img.width+'×'+img.height+'</div></div><button class="del" data-idx="'+i+'">✕</button>';d.addEventListener('click',e=>{if(e.target.closest('.del'))return;state.currentIndex=i;renderFileList();renderCanvas()});d.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();state.images.splice(i,1);if(state.currentIndex>=state.images.length)state.currentIndex=state.images.length-1;if(state.currentIndex<0&&state.images.length>0)state.currentIndex=0;renderFileList();renderCanvas();updateFooter();toast('已删除')});c.appendChild(d)});updateFooter()}
function updateFooter(){const t=state.images.length;D.footerInfo.textContent='共 '+t+' 张'+(getCurrentImage()?' · '+getCurrentImage().name:'')}

function setupDragDrop(){const c=D.fileList;c.addEventListener('dragover',e=>{e.preventDefault();D.dropzone.classList.add('dragover')});c.addEventListener('dragleave',()=>D.dropzone.classList.remove('dragover'));c.addEventListener('drop',e=>{e.preventDefault();D.dropzone.classList.remove('dragover');addFiles(e.dataTransfer.files)});D.dropzone.addEventListener('click',()=>D.addFilesBtn.click());D.addFilesBtn.addEventListener('click',()=>{const i=document.createElement('input');i.type='file';i.accept='image/*';i.multiple=true;i.onchange=()=>{if(i.files.length)addFiles(i.files);i.remove()};i.click()});D.clearAllBtn.addEventListener('click',()=>{if(state.images.length&&confirm('清空所有图片？')){state.images=[];state.currentIndex=-1;renderFileList();renderCanvas();updateFooter();toast('已清空')}})}

// ----- Darken -----
function genDark(img){const c=document.createElement('canvas'),ctx=c.getContext('2d');c.width=img.width;c.height=img.height;ctx.drawImage(loadImg(img.dataURL),0,0);const d=ctx.getImageData(0,0,c.width,c.height).data,w=c.width,h=c.height,range=parseInt(D.darkRange.value)/100,str=parseInt(D.darkStrength.value)/100,topP=parseInt(D.topProtect.value)/100,feather=parseInt(D.feather.value)/100,tRetain=parseInt(D.textureRetain.value)/100,tRGB=hexToRgb(getSelectedColors()[0]||'#1a1a2e');let bgR=0,bgG=0,bgB=0,cnt=0;for(let y=0;y<h;y+=4)for(let x=0;x<w;x+=4)if(x<10||x>w-10||y<10||y>h-10){const i=(y*w+x)*4;bgR+=d[i];bgG+=d[i+1];bgB+=d[i+2];cnt++}if(cnt){bgR/=cnt;bgG/=cnt;bgB/=cnt}for(let i=0;i<d.length;i+=4){const x=(i/4)%w,y=Math.floor((i/4)/w),r=d[i],g=d[i+1],b=d[i+2];let sim=1-Math.min(Math.sqrt((r-bgR)**2+(g-bgG)**2+(b-bgB)**2)/(Math.sqrt(3)*255),1);let m=sim>range?1:0;if(feather>0&&sim>range-feather&&sim<range+feather)m=(sim-(range-feather))/(feather*2);if(topP>0){const f=Math.min(y/(h*topP),1);m*=1-f*0.8}const mix=m*str*(0.6+0.4*tRetain);d[i]=r*(1-mix)+tRGB.r*mix;d[i+1]=g*(1-mix)+tRGB.g*mix;d[i+2]=b*(1-mix)+tRGB.b*mix}ctx.putImageData(new ImageData(d,w,h),0,0);return c.toDataURL('image/png')}
function genDarkMask(img){const c=document.createElement('canvas'),ctx=c.getContext('2d');c.width=img.width;c.height=img.height;ctx.drawImage(loadImg(img.dataURL),0,0);const d=ctx.getImageData(0,0,c.width,c.height).data,w=c.width,h=c.height,range=parseInt(D.darkRange.value)/100;let bgR=0,bgG=0,bgB=0,cnt=0;for(let y=0;y<h;y+=4)for(let x=0;x<w;x+=4)if(x<10||x>w-10||y<10||y>h-10){const i=(y*w+x)*4;bgR+=d[i];bgG+=d[i+1];bgB+=d[i+2];cnt++}if(cnt){bgR/=cnt;bgG/=cnt;bgB/=cnt}for(let i=0;i<d.length;i+=4){const r=d[i],g=d[i+1],b=d[i+2];let sim=1-Math.min(Math.sqrt((r-bgR)**2+(g-bgG)**2+(b-bgB)**2)/(Math.sqrt(3)*255),1);const v=sim>range?255:0;d[i]=v;d[i+1]=v;d[i+2]=v}ctx.putImageData(new ImageData(d,w,h),0,0);return c.toDataURL('image/png')}
function genDarkColor(img,hex){const c=document.createElement('canvas'),ctx=c.getContext('2d');c.width=img.width;c.height=img.height;ctx.drawImage(loadImg(img.dataURL),0,0);const d=ctx.getImageData(0,0,c.width,c.height).data,w=c.width,h=c.height,range=parseInt(D.darkRange.value)/100,str=parseInt(D.darkStrength.value)/100,topP=parseInt(D.topProtect.value)/100,feather=parseInt(D.feather.value)/100,tRetain=parseInt(D.textureRetain.value)/100,tRGB=hexToRgb(hex);let bgR=0,bgG=0,bgB=0,cnt=0;for(let y=0;y<h;y+=4)for(let x=0;x<w;x+=4)if(x<10||x>w-10||y<10||y>h-10){const i=(y*w+x)*4;bgR+=d[i];bgG+=d[i+1];bgB+=d[i+2];cnt++}if(cnt){bgR/=cnt;bgG/=cnt;bgB/=cnt}for(let i=0;i<d.length;i+=4){const x=(i/4)%w,y=Math.floor((i/4)/w),r=d[i],g=d[i+1],b=d[i+2];let sim=1-Math.min(Math.sqrt((r-bgR)**2+(g-bgG)**2+(b-bgB)**2)/(Math.sqrt(3)*255),1);let m=sim>range?1:0;if(feather>0&&sim>range-feather&&sim<range+feather)m=(sim-(range-feather))/(feather*2);if(topP>0){const f=Math.min(y/(h*topP),1);m*=1-f*0.8}const mix=m*str*(0.6+0.4*tRetain);d[i]=r*(1-mix)+tRGB.r*mix;d[i+1]=g*(1-mix)+tRGB.g*mix;d[i+2]=b*(1-mix)+tRGB.b*mix}ctx.putImageData(new ImageData(d,w,h),0,0);return c.toDataURL('image/png')}

// ----- Text Removal -----
function genText(img){const c=document.createElement('canvas'),ctx=c.getContext('2d');c.width=img.width;c.height=img.height;ctx.drawImage(loadImg(img.dataURL),0,0);const sel=img.textSelections||[];if(!sel.length)return c.toDataURL('image/png');const d=ctx.getImageData(0,0,c.width,c.height).data,w=c.width,h=c.height,mode=D.repairMode.value,sW=parseInt(D.sampleWidth.value);const m=new Uint8Array(w*h);sel.forEach(s=>{if(s.type==='rect'){const x1=Math.max(0,Math.floor(s.x-2)),y1=Math.max(0,Math.floor(s.y-2)),x2=Math.min(w,Math.ceil(s.x+s.w+2)),y2=Math.min(h,Math.ceil(s.y+s.h+2));for(let y=y1;y<y2;y++)for(let x=x1;x<x2;x++)m[y*w+x]=1}});for(const s of sel){let x1,y1,x2,y2;if(s.type==='rect'){x1=Math.max(0,Math.floor(s.x-sW));y1=Math.max(0,Math.floor(s.y-sW));x2=Math.min(w,Math.ceil(s.x+s.w+sW));y2=Math.min(h,Math.ceil(s.y+s.h+sW))}else continue;let sr=0,sg=0,sb=0,sc=0;for(let y=y1;y<y2;y++)for(let x=x1;x<x2;x++){const i=y*w+x;if(m[i]<0.5){const p=i*4;sr+=d[p];sg+=d[p+1];sb+=d[p+2];sc++}}if(!sc)continue;sr/=sc;sg/=sc;sb/=sc;for(let y=y1;y<y2;y++)for(let x=x1;x<x2;x++){const i=y*w+x;if(m[i]>0.1){const p=i*4;const b=mode==='blend'?0.7:0.9;d[p]=d[p]*(1-b)+sr*b;d[p+1]=d[p+1]*(1-b)+sg*b;d[p+2]=d[p+2]*(1-b)+sb*b}}}ctx.putImageData(new ImageData(d,w,h),0,0);return c.toDataURL('image/png')}
function genTextMask(img){const c=document.createElement('canvas'),ctx=c.getContext('2d');c.width=img.width;c.height=img.height;ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);const sel=img.textSelections||[];ctx.fillStyle='rgba(255,255,255,0.5)';sel.forEach(s=>{if(s.type==='rect')ctx.fillRect(s.x,s.y,s.w,s.h)});return c.toDataURL('image/png')}

// ----- Crop + Watermark -----
function genCrop(img){const mode=D.cropMode.value,tw=parseInt(D.cropW.value)||720,th=parseInt(D.cropH.value)||1280,fc=D.fillColor.value;if(mode==='none')return img.dataURL;const c=document.createElement('canvas'),ctx=c.getContext('2d'),src=loadImg(img.dataURL),sw=src.width,sh=src.height;let dw=tw,dh=th,sx=0,sy=0,sw2=sw,sh2=sh;if(mode==='fill'){const r=tw/th,sr2=sw/sh;if(sr2>r){sw2=sh*r;sx=(sw-sw2)/2}else{sh2=sw/r;sy=(sh-sh2)/2}c.width=tw;c.height=th;ctx.drawImage(src,sx,sy,sw2,sh2,0,0,tw,th)}else{c.width=tw;c.height=th;ctx.fillStyle=fc;ctx.fillRect(0,0,tw,th);const r=Math.min(tw/sw,th/sh);ctx.drawImage(src,(tw-sw*r)/2,(th-sh*r)/2,sw*r,sh*r)}
if(D.watermarkToggle.checked){const text=D.watermarkText.value.trim(),size=parseInt(D.watermarkSize.value)||32,pos=D.watermarkPosition.value,pad=20;if(text){ctx.save();ctx.font='bold '+size+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';let x=pad,y=pad;if(pos==='右上'){x=tw-pad;y=pad}else if(pos==='右下'){x=tw-pad;y=th-pad}else if(pos==='左下'){x=pad;y=th-pad}else if(pos==='居中'){x=tw/2;y=th/2}const sw2=parseInt(D.watermarkStrokeWidth.value)||0;if(sw2>0){ctx.strokeStyle=D.watermarkStrokeColor.value;ctx.lineWidth=sw2;ctx.strokeText(text,x,y)}ctx.fillStyle=D.watermarkTextColor.value;ctx.fillText(text,x,y);ctx.restore()}}return c.toDataURL('image/png')}

// ----- Auto Detect Text -----
function autoDetect(img){const c=document.createElement('canvas'),ctx=c.getContext('2d');c.width=img.width;c.height=img.height;ctx.drawImage(loadImg(img.dataURL),0,0);const d=ctx.getImageData(0,0,c.width,c.height).data,w=c.width,h=c.height,clusters=[];for(let y=0;y<h-8;y+=8)for(let x=0;x<w-8;x+=8){let sum=0;for(let dy=0;dy<8;dy++)for(let dx=0;dx<8;dx++){const i=((y+dy)*w+(x+dx))*4;sum+=d[i]*.299+d[i+1]*.587+d[i+2]*.114}const avg=sum/64;let var2=0;for(let dy=0;dy<8;dy++)for(let dx=0;dx<8;dx++){const i=((y+dy)*w+(x+dx))*4;const g=d[i]*.299+d[i+1]*.587+d[i+2]*.114;var2+=(g-avg)**2}if(var2/64>800){let merged=false;for(const c2 of clusters){if(Math.abs(x-c2.x)<20&&Math.abs(y-c2.y)<20){c2.x=Math.min(c2.x,x);c2.y=Math.min(c2.y,y);c2.w=Math.max(c2.x+c2.w,x+8)-c2.x;c2.h=Math.max(c2.y+c2.h,y+8)-c2.y;merged=true;break}}if(!merged)clusters.push({x,y,w:8,h:8})}}
const fs=clusters.filter(c=>c.w>10&&c.h>8&&c.w<w*.4&&c.h<h*.3).map(c=>({x:c.x-2,y:c.y-2,w:c.w+4,h:c.h+4,type:'rect'}));if(!fs.length){toast('未检测到文字');return}
img._textHistory=img._textHistory||[];img._textHistory.push(JSON.stringify(img.textSelections||[]));img.textSelections=(img.textSelections||[]).concat(fs);toast('检测到 '+fs.length+' 个区域')}

// ----- Render -----
function renderCanvas(){const canvas=D.canvas,ctx=canvas.getContext('2d'),wrap=D.wrap,img=getCurrentImage();ctx.clearRect(0,0,canvas.width,canvas.height);if(!img){canvas.width=800;canvas.height=600;ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#666';ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText('请导入图片',400,300);D.imgInfo.textContent='无图片';return}
D.imgInfo.textContent=img.name+'  '+img.width+'×'+img.height;let src=img.dataURL;const tool=state.tool;
if(tool==='darken'){if(state.view==='original')src=img.dataURL;else if(state.view==='mask')src=genDarkMask(img);else if(state.view==='compare'){const r=genDark(img);const cvs=document.createElement('canvas'),c=cvs.getContext('2d'),i1=loadImg(img.dataURL),i2=loadImg(r);cvs.width=i1.width*2;cvs.height=i1.height;c.drawImage(i1,0,0);c.drawImage(i2,i1.width,0);src=cvs.toDataURL()}else src=genDark(img)}
else if(tool==='textrm'){if(state.view==='original')src=img.dataURL;else if(state.view==='mask')src=genTextMask(img);else src=genText(img)}
else if(tool==='crop'){if(state.view==='original')src=img.dataURL;else src=genCrop(img)}
const ti=new Image();ti.onload=()=>{const wr=wrap.getBoundingClientRect(),pad=16,mw=wr.width-pad*2,mh=wr.height-pad*2;let dw=ti.width,dh=ti.height;if(dw>mw||dh>mh){const s=Math.min(mw/dw,mh/dh);dw*=s;dh*=s}canvas.width=dw;canvas.height=dh;ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(ti,0,0,dw,dh)};ti.src=src}

// ----- Pen -----
function setupPen(){const setM=m=>{state.penMode=m;[D.penAdd,D.penRemove,D.penEraser,D.penBox].forEach(b=>b.classList.remove('primary'));if(m==='add')D.penAdd.classList.add('primary');else if(m==='remove')D.penRemove.classList.add('primary')};
D.penAdd.addEventListener('click',()=>setM('add'));D.penRemove.addEventListener('click',()=>setM('remove'));D.penEraser.addEventListener('click',()=>setM('eraser'));D.penBox.addEventListener('click',()=>setM('box'));
D.brushSize.addEventListener('input',()=>{state.brushSize=parseInt(D.brushSize.value);document.getElementById('brushSizeVal').textContent=state.brushSize});
const ca=D.canvas;let drawing=false,bx=0,by=0;
ca.addEventListener('mousedown',e=>{const img=getCurrentImage();if(!img||!state.penMode)return;const r=ca.getBoundingClientRect(),sx=img.width/canvas.width,sy=img.height/canvas.height,px=(e.clientX-r.left)*sx,py=(e.clientY-r.top)*sy;
if(state.penMode==='box'){bx=px;by=py;drawing=true;return}
drawing=true;const bs=state.brushSize;if(state.tool==='darken'){img.darkSelections=img.darkSelections||[];img.darkSelections.push({x:px-bs,y:py-bs,w:bs*2,h:bs*2,type:state.penMode})}else if(state.tool==='textrm'&&state.penMode==='add'){img.textSelections=img.textSelections||[];img._textHistory=img._textHistory||[];img._textHistory.push(JSON.stringify(img.textSelections));img.textSelections.push({x:px,y:py,r:12,type:'point'})}renderCanvas()});
ca.addEventListener('mousemove',e=>{if(!drawing)return;const img=getCurrentImage();if(!img)return;const r=ca.getBoundingClientRect(),sx=img.width/canvas.width,sy=img.height/canvas.height,px=(e.clientX-r.left)*sx,py=(e.clientY-r.top)*sy;
if(state.penMode==='box')return;const bs=state.brushSize;if(state.tool==='darken'){img.darkSelections.push({x:px-bs,y:py-bs,w:bs*2,h:bs*2,type:state.penMode})}renderCanvas()});
ca.addEventListener('mouseup',e=>{if(state.penMode==='box'&&drawing){const img=getCurrentImage();if(img){const r=ca.getBoundingClientRect(),sx=img.width/canvas.width,sy=img.height/canvas.height,px=(e.clientX-r.left)*sx,py=(e.clientY-r.top)*sy;const x=Math.min(bx,px),y=Math.min(by,py),w=Math.abs(px-bx),h=Math.abs(py-by);if(w>5&&h>5){if(state.tool==='textrm'){img._textHistory=img._textHistory||[];img._textHistory.push(JSON.stringify(img.textSelections||[]));img.textSelections.push({x,y,w,h,type:'rect'})}toast('已框选 '+Math.round(w)+'×'+Math.round(h));renderCanvas()}}}drawing=false});
ca.addEventListener('mouseleave',()=>{drawing=false})}

// ----- Colors -----
function renderColors(){D.swatches.innerHTML='';state.colors.forEach((c,i)=>{const d=document.createElement('div');d.className='swatch'+(c.selected?' active':'');d.style.background=c.hex;d.innerHTML='<span class="checkmark">✓</span>';d.addEventListener('click',()=>{c.selected=!c.selected;renderColors();renderCanvas()});D.swatches.appendChild(d)})}

// ----- Tools -----
function switchTool(t){state.tool=t;D.toolBtns.forEach(b=>b.classList.toggle('active',b.dataset.tool===t));['darken','textrm','crop'].forEach(p=>{document.getElementById('panel-'+p).classList.toggle('active',p===t)});document.getElementById('toolActions').style.display=(t==='darken'||t==='textrm')?'flex':'none';D.toolStatus.textContent=t==='darken'?'背景压暗':t==='textrm'?'文字消除':'尺寸裁剪';renderCanvas()}
function switchView(v){state.view=v;document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v));renderCanvas()}

// ----- Download -----
function dl(url,name){const a=document.createElement('a');a.download=name;a.href=url;a.click()}
function handleDL(){const img=getCurrentImage();if(!img){toast('请先选择图片');return}
const colors=getSelectedColors(),tool=state.tool;let total=0;const ext=D.outFormat.value;
if(tool==='darken'&&colors.length>1){colors.forEach(c=>{const r=genDarkColor(img,c);const n=img.name.replace(/\.[^.]+$/,'')+'_'+c.replace('#','')+'.'+ext;dl(r,n);total++});toast('导出 '+total+' 张');return}
const src=tool==='darken'?genDark(img):tool==='textrm'?genText(img):genCrop(img);const n=img.name.replace(/\.[^.]+$/,'')+'_'+tool+'.'+ext;dl(src,n);toast('下载完成')}
function handleBatch(){const imgs=state.images;if(!imgs.length){toast('请勾选图片');return};const colors=getSelectedColors(),tool=state.tool,ext=D.outFormat.value;let total=0;imgs.forEach(img=>{if(tool==='darken'&&colors.length>1){colors.forEach(c=>{dl(genDarkColor(img,c),img.name.replace(/\.[^.]+$/,'')+'_'+c.replace('#','')+'.'+ext);total++})}else{const src=tool==='darken'?genDark(img):tool==='textrm'?genText(img):genCrop(img);dl(src,img.name.replace(/\.[^.]+$/,'')+'_'+tool+'.'+ext);total++}});toast('导出 '+total+' 张')}

// ----- Init -----
function init(){renderColors();setupDragDrop();setupPen();document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>switchView(b.dataset.view)));D.toolBtns.forEach(b=>b.addEventListener('click',()=>switchTool(b.dataset.tool)));D.downloadCurrent.addEventListener('click',handleDL);D.downloadBatch.addEventListener('click',handleBatch);D.resetViewBtn.addEventListener('click',renderCanvas);D.autoDetectText.addEventListener('click',()=>{const img=getCurrentImage();if(img)autoDetect(img);else toast('请先选择图片')});D.applyTextAll.addEventListener('click',()=>{const img=getCurrentImage();if(!img||!img.textSelections||!img.textSelections.length){toast('当前图片无选区');return};state.images.forEach(i=>{if(i.id!==img.id)i.textSelections=img.textSelections.map(s=>({...s}))});toast('已应用到所有')});D.undoText.addEventListener('click',()=>{const img=getCurrentImage();if(!img)return;const h=img._textHistory||[];if(!h.length){toast('无记录');return};const last=h.pop();if(last){img.textSelections=JSON.parse(last);renderCanvas();toast('已撤销')}});D.clearText.addEventListener('click',()=>{const img=getCurrentImage();if(!img)return;img.textSelections=[];img._textHistory=[];renderCanvas();toast('已清空')});D.colorPicker.addEventListener('input',()=>{state.currentColorHex=D.colorPicker.value});D.addColorBtn.addEventListener('click',()=>{const h=state.currentColorHex;if(!state.colors.find(c=>c.hex===h)){state.colors.push({hex:h,selected:true});renderColors()}else toast('颜色已存在')});D.selectAllColors.addEventListener('click',()=>{state.colors.forEach(c=>c.selected=true);renderColors();renderCanvas()});D.deselectAllColors.addEventListener('click',()=>{state.colors.forEach(c=>c.selected=false);renderColors();renderCanvas()});D.themeToggle.addEventListener('click',()=>{state.theme=state.theme==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',state.theme);D.themeToggle.textContent=state.theme==='light'?'🌙':'☀️'});D.outQuality.addEventListener('input',()=>{document.getElementById('outQualityVal').textContent=D.outQuality.value});window.addEventListener('resize',renderCanvas);switchTool('darken');renderCanvas();updateFooter();toast('已加载，拖入图片开始')}
init();
})();
</script>
