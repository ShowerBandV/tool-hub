<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="description" content="图片盒子 — 在线图片处理工具集：SVG预览转换、图片裁剪缩放、颜色拾取、水印平铺、拼长图等。">
  <title>图片盒子 · Tool Hub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">
  <link rel="stylesheet" href="../assets/css/main.css">

<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../index.html">🧰 首页</a> <span class="sep">›</span> 🖼️ 图片盒子
    </div>
    <header class="app-header">
      <div class="app-logo">
        <div class="logo-icon">🖼️</div>
        <h1 class="app-title">图片盒子</h1>
      </div>
      <p class="app-subtitle">Image Toolbox · 在线图片处理工具集 — 纯前端处理，图片不上传服务器，保护隐私安全</p>
    </header>

    <div class="tool-grid">
      <a href="../dev-tools/svg-tool/index.html" class="tool-card">
        <span class="tool-icon">🎨</span>
        <div class="tool-info">
          <div class="tool-name">SVG 预览转换</div>
          <div class="tool-desc">预览SVG效果 / 导出PNG/JPG/WebP</div>
        </div>
      </a>
      <a href="../dev-tools/image-crop/index.html" class="tool-card">
        <span class="tool-icon">✂️</span>
        <div class="tool-info">
          <div class="tool-name">图片裁剪缩放</div>
          <div class="tool-desc">拖拽裁剪 + 指定尺寸缩放导出</div>
        </div>
      </a>
      <a href="../dev-tools/color-picker/index.html" class="tool-card">
        <span class="tool-icon">💉</span>
        <div class="tool-info">
          <div class="tool-name">图片颜色拾取</div>
          <div class="tool-desc">坐标点击获取RGB/HEX/HSL颜色值</div>
        </div>
      </a>
      <a href="../dev-tools/color-convert/index.html" class="tool-card">
        <span class="tool-icon">🎨</span>
        <div class="tool-info">
          <div class="tool-name">颜色转换</div>
          <div class="tool-desc">RGB / HEX / HSL 颜色互转</div>
        </div>
      </a>
      <a href="../dev-tools/image-watermark/index.html" class="tool-card">
        <span class="tool-icon">💧</span>
        <div class="tool-info">
          <div class="tool-name">图片水印平铺</div>
          <div class="tool-desc">文字/图片水印平铺全图</div>
        </div>
      </a>
      <a href="../dev-tools/image-stitch/index.html" class="tool-card">
        <span class="tool-icon">🖼️</span>
        <div class="tool-info">
          <div class="tool-name">图片拼长图</div>
          <div class="tool-desc">多图横/纵向拼接为长图</div>
        </div>
      </a>
    </div>

    <div class="ad-unit ad-footer">
      <span>📢 广告位</span>
    </div>
