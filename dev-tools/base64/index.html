  <script src="../../assets/js/common.js"></script>
  <script>
    const textIn = document.getElementById('b64Text'), res = document.getElementById('b64Result');
    document.getElementById('b64Encode').onclick = () => {
      try { res.textContent = btoa(unescape(encodeURIComponent(textIn.value))); res.className='result-box show'; } catch(e) { res.textContent = e.message; }
    };
    document.getElementById('b64Decode').onclick = () => {
      try { res.textContent = decodeURIComponent(escape(atob(textIn.value.trim()))); res.className='result-box show'; } catch(e) { res.textContent = e.message; }
    };
    document.getElementById('imgFile').onchange = function(e) {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('b64ImgInput').value = ev.target.result;
        document.getElementById('imgPreview').innerHTML = '<img src="'+ev.target.result+'" style="max-width:200px;border-radius:8px;"><br><button class="btn btn-sm export-img-btn">⬇️ 导出图片</button>';
      };
      reader.readAsDataURL(file);
    };
    document.getElementById('b64ShowImg').onclick = () => {
      const val = document.getElementById('b64ImgInput').value.trim();
      if(val) document.getElementById('imgPreview').innerHTML = '<img src="'+val+'" style="max-width:200px;" onerror="this.outerHTML=\'<span style=color:red>无效图片</span>\'"><br><button class="btn btn-sm export-img-btn">⬇️ 导出图片</button>';
    };
    document.addEventListener('click', (e) => {
      if(e.target.classList.contains('export-img-btn')) {
        const img = document.querySelector('#imgPreview img');
        if(img) {
          const canvas = document.createElement('canvas'); canvas.width=img.naturalWidth; canvas.height=img.naturalHeight;
          const ctx = canvas.getContext('2d'); ctx.drawImage(img,0,0);
          downloadImage(canvas, 'base64-image.png');
        }
      }
    });
  </script>
