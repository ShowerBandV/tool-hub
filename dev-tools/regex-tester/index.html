        </select>

      <label class="form-label" style="margin-top:8px;">测试文本</label>
      <textarea class="form-input" id="regexText"></textarea>
      <div class="result-box show" id="regexResult" style="margin-top:8px;min-height:60px;"></div>
    </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    const pat = document.getElementById('regexPat'), flags = document.getElementById('regexFlags');
    const text = document.getElementById('regexText'), res = document.getElementById('regexResult');
    function update() {
      if (!text.value) { res.innerHTML = ''; return; }
      try {
        const re = new RegExp(pat.value, flags.value);
        const replaced = text.value.replace(re, m => '<span class="regex-highlight">'+m+'</span>');
        res.innerHTML = replaced || text.value;
      } catch(e) { res.innerHTML = '<span style="color:var(--danger)">'+e.message+'</span>'; }
    }
    pat.oninput = flags.onchange = text.oninput = update;
  </script>
