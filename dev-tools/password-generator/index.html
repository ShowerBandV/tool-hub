  <meta name="description" content="在线高强度密码生成器，支持自定义长度与字符类型，一键生成安全随机密码保护账号。">

<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../../index.html">🧰 首页</a> <span class="sep">›</span>
      <a href="../index.html">🛠️ 开发者盒子</a> <span class="sep">›</span> 密码生成器
    </div>

    <div class="card tool-panel">
      <h2 class="panel-title">🔑 密码生成器</h2>
      <p class="panel-desc">在线高强度密码生成器。勾选大写字母、小写字母、数字、符号等字符类型，拖动滑块设置密码长度（8-128位），一键生成并复制安全随机密码，保护你的在线账号安全。</p>
      <label class="form-label">长度 <span id="pwLenVal">16</span></label>
      <input type="range" id="pwLen" min="4" max="64" value="16" style="width:100%;accent-color:var(--accent);">
      <div style="margin:8px 0;display:flex;gap:16px;flex-wrap:wrap;">
        <label><input type="checkbox" id="pwUpper" checked> A-Z</label>
        <label><input type="checkbox" id="pwLower" checked> a-z</label>
        <label><input type="checkbox" id="pwDigits" checked> 0-9</label>
        <label><input type="checkbox" id="pwSym"> !@#</label>
      </div>
      <div class="result-box show" id="pwResult" style="font-size:1.2rem;text-align:center;word-break:break-all;"></div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn btn-primary" id="pwGen">生成</button>
        <button class="btn btn-sm" id="pwExport">⬇️ 导出密码</button>
      </div>
    </div>

    <div class="ad-unit ad-leaderboard">
      <span>📢 广告位</span>
    </div>

    <div class="card" style="margin-top:20px;">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:10px;">🛠️ 更多开发者工具</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:5px;">
        <a href="../json-formatter/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>{ }</span> JSON 格式化</a>
        <a href="../base64/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🔐</span> Base64 编解码</a>
        <a href="../regex-tester/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>.*</span> 正则测试器</a>
        <a href="../password-generator/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🔑</span> 密码生成器</a>
        <a href="../timestamp/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>⏰</span> 时间戳转换</a>
        <a href="../uuid-generator/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🆔</span> UUID 生成器</a>
        <a href="../hash/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>#</span> 哈希计算</a>
        <a href="../url-encode/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🔗</span> URL 编解码</a>
        <a href="../word-count/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📊</span> 字数统计</a>
        <a href="../qrcode/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📱</span> 二维码工具</a>
        <a href="../countdown/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>⏳</span> 倒计时</a>
        <a href="../random-number/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🎲</span> 随机数生成</a>
        <a href="../marquee/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🎠</span> 跑马灯</a>
        <a href="../http-status/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📡</span> HTTP 状态码</a>

        <a href="../html-symbols/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🆎</span> HTML 符号</a>
      </div>
    </div>
  </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    const lenS = document.getElementById('pwLen'), res = document.getElementById('pwResult');
    lenS.oninput = () => document.getElementById('pwLenVal').textContent = lenS.value;
    function gen() {
      let chars = '';
      if(document.getElementById('pwUpper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if(document.getElementById('pwLower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
      if(document.getElementById('pwDigits').checked) chars += '0123456789';
      if(document.getElementById('pwSym').checked) chars += '!@#$%^&*()_+-=';
      if(!chars) return;
      const arr = new Uint32Array(parseInt(lenS.value)); crypto.getRandomValues(arr);
      res.textContent = Array.from(arr, x => chars[x % chars.length]).join('');
      res.className = 'result-box show';
    }
    document.getElementById('pwGen').onclick = gen;
    document.getElementById('pwExport').onclick = () => downloadText(res.textContent, 'password.txt');
    gen();
  </script>
