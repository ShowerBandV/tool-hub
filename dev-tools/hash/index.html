  <script>
    const input = document.getElementById('hashInput'), res = document.getElementById('hashResult');
    function bindCopy() {
      res.querySelector('.copy-btn')?.addEventListener('click', () => navigator.clipboard.writeText(res.textContent.replace('📋','').trim()));

    async function compute(algo) {
      if (algo === 'MD5') { res.innerHTML = md5(input.value) + '<button class="copy-btn">📋</button>'; bindCopy(); return; }
      const data = new TextEncoder().encode(input.value);
      const hash = await crypto.subtle.digest(algo, data);
      const hex = Array.from(new Uint8Array(hash), b => b.toString(16).padStart(2,'0')).join('');
      res.innerHTML = hex + '<button class="copy-btn">📋</button>';
      bindCopy();
    }
    document.querySelectorAll('.hash-btn').forEach(b => b.onclick = () => compute(b.dataset.algo));
    bindCopy();
