  <script src="../../assets/js/common.js"></script>
  <script>
    const qrContainer = document.getElementById('qrCode');
    new QRCode(qrContainer, {text:'https://example.com',width:150,height:150});
    document.getElementById('qrGen').onclick = () => {
      qrContainer.innerHTML = '';
      new QRCode(qrContainer, {text:document.getElementById('qrText').value,width:150,height:150});
    };
    document.getElementById('qrExport').onclick = () => {
      const canvas = qrContainer.querySelector('canvas');
      if(canvas) downloadImage(canvas, 'qrcode.png');
    };
    document.getElementById('qrFile').onchange = function(e) {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image(); img.src = ev.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas'); canvas.width=img.width; canvas.height=img.height;
          const ctx = canvas.getContext('2d'); ctx.drawImage(img,0,0);
          const data = ctx.getImageData(0,0,canvas.width,canvas.height);
          const code = jsQR(data.data, canvas.width, canvas.height);
          document.getElementById('qrDecodeRes').textContent = code ? code.data : '未检测到二维码';
          document.getElementById('qrDecodeRes').className = 'result-box show';
        };
      };
      reader.readAsDataURL(file);
    };
  </script>
