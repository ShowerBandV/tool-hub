      <div class="slider-row"><span style="width:20px;font-weight:700;">G</span><input type="range" id="gSl" min="0" max="255" value="110"><span id="gVal" style="width:36px;font-family:var(--font-mono);">110</span></div>
      <div class="slider-row"><span style="width:20px;font-weight:700;">B</span><input type="range" id="bSl" min="0" max="255" value="247"><span id="bVal" style="width:36px;font-family:var(--font-mono);">247</span></div>
    </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    const prev = document.getElementById('colorPrev'), pick = document.getElementById('colorPick'), hexIn = document.getElementById('hexIn');
    const rSl=document.getElementById('rSl'),gSl=document.getElementById('gSl'),bSl=document.getElementById('bSl');
    function update() {
      const r=+rSl.value,g=+gSl.value,b=+bSl.value;
      prev.style.background='rgb('+r+','+g+','+b+')';
      const hex = '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
      hexIn.value=hex; pick.value=hex;
      document.getElementById('rVal').textContent=r;
      document.getElementById('gVal').textContent=g;
      document.getElementById('bVal').textContent=b;
    }
    [rSl,gSl,bSl].forEach(s=>s.oninput=update);
    pick.oninput = () => {
      hexIn.value=pick.value;
      const r=parseInt(pick.value.slice(1,3),16),g=parseInt(pick.value.slice(3,5),16),b=parseInt(pick.value.slice(5,7),16);
      rSl.value=r;gSl.value=g;bSl.value=b; update();
    };
    hexIn.oninput = () => {
      let v = hexIn.value.trim();
      if (v.length === 4 && /^#[0-9a-fA-F]{3}$/.test(v)) {
        v = '#' + v[1]+v[1] + v[2]+v[2] + v[3]+v[3];
        hexIn.value = v;
      }
      if(/^#[0-9a-fA-F]{6}$/.test(v)) {
        pick.value=v;
        rSl.value=parseInt(v.slice(1,3),16);gSl.value=parseInt(v.slice(3,5),16);bSl.value=parseInt(v.slice(5,7),16);
        update();
      }
    };
  </script>
