<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self';">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <meta name="description" content="SQL格式化工具 — 在线美化压缩的SQL语句，支持格式化与压缩互转。">
  <title>SQL格式化 · 开发者盒子</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .output-area {
      background: #f8fafc; border: 2px solid var(--border);
      border-radius: var(--radius-xs); padding: 14px 16px;
      font-family: var(--font-mono); font-size: 0.85rem;
      line-height: 1.6; min-height: 80px;
      white-space: pre-wrap; word-break: break-all;
      color: var(--text); max-height: 400px; overflow-y: auto;
      margin-top: 6px;
    }
    #sql-input { font-family: var(--font-mono); font-size: 0.85rem; min-height: 120px; }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../../index.html">🧰 首页</a> <span class="sep">›</span>
      <a href="../index.html">🛠️ 开发者盒子</a> <span class="sep">›</span> SQL格式化
    </div>
    <header class="app-header">
      <div class="app-logo">
        <span class="logo-icon">📝</span>
        <span class="app-title">SQL格式化</span>
      </div>
      <p class="app-subtitle">美化SQL语句使其更易阅读，支持压缩还原为单行</p>
    </header>
    <div class="card tool-panel">
      <div class="form-group">
        <label class="form-label">输入SQL语句</label>
        <textarea class="form-input" id="sql-input" rows="6" placeholder="输入SQL语句...">SELECT u.id,u.name,o.order_date,o.amount FROM users u INNER JOIN orders o ON u.id=o.user_id WHERE u.status='active' AND o.amount>100 GROUP BY u.id ORDER BY o.order_date DESC LIMIT 50;</textarea>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="formatSQL()">🔧 格式化</button>
        <button class="btn btn-outline" onclick="minifySQL()">压缩SQL</button>
        <button class="btn btn-outline" onclick="document.getElementById('sql-input').value='';document.getElementById('sql-result').textContent='等待格式化...';">清空</button>
      </div>
      <label class="form-label" style="margin-top:12px;">结果</label>
      <div class="output-area" id="sql-result">等待格式化...</div>
      <button class="btn btn-outline btn-sm" onclick="copyResult()" style="margin-top:6px;">📋 复制结果</button>
    </div>
  </div>
  <script src="../../assets/js/common.js"></script>
  <script>
    const KEYWORDS = ['SELECT','FROM','WHERE','AND','OR','NOT','IN','ON','JOIN','INNER JOIN','LEFT JOIN','RIGHT JOIN','FULL JOIN','CROSS JOIN','GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET','AS','DISTINCT','COUNT','SUM','AVG','MAX','MIN','BETWEEN','LIKE','IS','NULL','EXISTS','CASE','WHEN','THEN','ELSE','END','UNION','ALL','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','DROP','ALTER','INDEX','VIEW','UNION ALL','LEFT OUTER JOIN','RIGHT OUTER JOIN','FULL OUTER JOIN'];

    function formatSQLInternal(sql) {
      let indent = 0, out = '';
      const tokens = sql.replace(/\s+/g, ' ').trim();
      let i = 0;
      while (i < tokens.length) {
        let found = false;
        for (const kw of [...KEYWORDS].sort((a,b) => b.length - a.length)) {
          if (tokens.slice(i).toUpperCase().startsWith(kw) && (tokens.length <= i + kw.length || ' \n('.includes(tokens[i + kw.length]))) {
            if (['SELECT','FROM','WHERE','ORDER BY','GROUP BY','HAVING','LIMIT','AND','OR','ON','SET'].includes(kw)) {
              out += '\n' + '  '.repeat(Math.max(0, indent)) + kw;
            } else if (kw.includes('JOIN') || kw === 'UNION ALL' || kw === 'UNION') {
              indent = Math.max(0, indent - 1);
              out += '\n' + '  '.repeat(Math.max(0, indent)) + kw;
              indent++;
            } else {
              out += ' ' + kw;
            }
            i += kw.length;
            found = true;
            break;
          }
        }
        if (!found) { out += tokens[i]; i++; }
      }
      return out.trim();
    }

    function formatSQL() {
      const input = document.getElementById('sql-input').value.trim();
      if (!input) { document.getElementById('sql-result').textContent = '⚠️ 请输入SQL语句'; return; }
      document.getElementById('sql-result').textContent = formatSQLInternal(input);
    }

    function minifySQL() {
      const input = document.getElementById('sql-input').value.trim();
      if (!input) return;
      document.getElementById('sql-input').value = input.replace(/\s+/g, ' ').replace(/\s*,\s*/g, ',').replace(/\s*=\s*/g, '=').replace(/\s*\(\s*/g, '(').replace(/\s*\)\s*/g, ')');
      formatSQL();
    }

    function copyResult() {
      const text = document.getElementById('sql-result').textContent;
      if (!text || text === '等待格式化...') return;
      navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制'));
    }

    formatSQL();
  </script>
</body>
</html>
