    .cat-tab { padding: 6px 14px; border: 2px solid var(--border); border-radius: 20px;
      background: #fff; cursor: pointer; font-size: 0.78rem; font-weight: 500;
      transition: var(--transition); white-space: nowrap; }
    .cat-tab:hover { border-color: var(--accent); }
    .cat-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .tld-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 4px; }
    .tld-cell { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      border-radius: 10px; cursor: pointer; transition: var(--transition);
      border: 2px solid transparent; background: #f8fafc; }
    .tld-cell:hover { border-color: var(--accent); background: #eef2ff; }
    .tld-cell .domain { font-family: var(--font-mono); font-weight: 700; font-size: 0.85rem;
      color: var(--accent); white-space: nowrap; }
    .tld-cell .desc { font-size: 0.72rem; color: var(--text-muted); line-height: 1.3;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .count-badge { font-size: 0.72rem; color: var(--text-muted); margin-left: 4px; }
    .toast-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 8px 20px; border-radius: 20px;
      font-size: 0.85rem; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 999; }
    .toast-hint.show { opacity: 1; }
  </style>

    var allTlds = [];
    var catKeys = Object.keys(categories);

    catKeys.forEach(function(cat) {
      categories[cat].forEach(function(e) {
        allTlds.push({ domain: e[0], desc: e[1], category: cat });
      });
    });

    var currentCat = 'all';
    var searchQuery = '';

    var searchInput = document.getElementById('searchInput');
    var categoryTabs = document.getElementById('categoryTabs');
    var tldGrid = document.getElementById('tldGrid');
    var toastHint = document.getElementById('toastHint');

    function renderCategoryTabs() {
      var html = '<span class="cat-tab active" data-cat="all">全部 <span class="count-badge">(' + allTlds.length + ')</span></span>';
      catKeys.forEach(function(cat) {
        html += '<span class="cat-tab" data-cat="' + cat + '">' + cat + ' <span class="count-badge">(' + categories[cat].length + ')</span></span>';
      });
      categoryTabs.innerHTML = html;

      categoryTabs.querySelectorAll('.cat-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          categoryTabs.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); });
          tab.classList.add('active');
          currentCat = tab.dataset.cat;
          renderTlds();
        });
      });
    }

    function renderTlds() {
      var filtered = allTlds.filter(function(t) {
        var matchCat = currentCat === 'all' || t.category === currentCat;
        var matchSearch = !searchQuery || t.domain.toLowerCase().indexOf(searchQuery.toLowerCase()) !== -1 || t.desc.indexOf(searchQuery) !== -1;
        return matchCat && matchSearch;
      });

      tldGrid.innerHTML = filtered.map(function(t) {
        return '<div class="tld-cell" title="点击复制 ' + escapeHTML(t.domain) + '" data-domain="' + escapeHTML(t.domain) + '"><span class="domain">' + escapeHTML(t.domain) + '</span><span class="desc">' + escapeHTML(t.desc) + '</span></div>';
      }).join('');

      tldGrid.querySelectorAll('.tld-cell').forEach(function(cell) {
        cell.addEventListener('click', function() {
          navigator.clipboard.writeText(cell.dataset.domain).then(function() {
            toastHint.textContent = '✅ 已复制: ' + cell.dataset.domain;
            toastHint.classList.add('show');
            clearTimeout(toastHint._t);
            toastHint._t = setTimeout(function() { toastHint.classList.remove('show'); }, 1500);
          });
        });
      });
    }

    searchInput.addEventListener('input', function() {
      searchQuery = this.value.trim();
      renderTlds();
    });
