  <script src="../../assets/js/common.js"></script>
  <script>
    var jwtInput = document.getElementById('jwtInput');
    var resultArea = document.getElementById('resultArea');

    function base64UrlDecode(str) {
      str = str.replace(/-/g, '+').replace(/_/g, '/');
      while (str.length % 4) str += '=';
      try {
        return decodeURIComponent(atob(str).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
      } catch(e) {
        return null;
      }
    }

    function tryFormatJSON(str) {
      try {
        var obj = JSON.parse(str);
        return JSON.stringify(obj, null, 2);
      } catch(e) {
        return str;
      }
    }

    function highlightJSON(json) {
      return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^"\\])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(m) {
          var cls = 'json-number';
          if (/^"/.test(m)) { cls = /:$/.test(m) ? 'json-key' : 'json-string'; }
          else if (/true|false/.test(m)) { cls = 'json-boolean'; }
          else if (/null/.test(m)) { cls = 'json-null'; }
          return '<span class="'+cls+'">'+m+'</span>';
        });
    }

    function decode() {
      var token = jwtInput.value.trim();
      if (!token) { resultArea.innerHTML = ''; return; }

      var parts = token.split('.');
      if (parts.length !== 3) {
        resultArea.innerHTML = '<div style="color:#dc2626;padding:12px;">❌ 无效的 JWT Token：应包含 3 个以 "." 分隔的部分（Header.Payload.Signature），当前有 ' + parts.length + ' 个部分</div>';
        return;
      }

      var headerDecoded = base64UrlDecode(parts[0]);
      var payloadDecoded = base64UrlDecode(parts[1]);

      if (!headerDecoded) {
        resultArea.innerHTML = '<div style="color:#dc2626;padding:12px;">❌ 无法解码 Header（第一部分）</div>';
        return;
      }
      if (!payloadDecoded) {
        resultArea.innerHTML = '<div style="color:#dc2626;padding:12px;">❌ 无法解码 Payload（第二部分）</div>';
        return;
      }

      var headerFormatted = tryFormatJSON(headerDecoded);
      var payloadFormatted = tryFormatJSON(payloadDecoded);

      // Parse exp
      var expBadge = '';
      try {
        var payload = JSON.parse(payloadDecoded);
        if (payload.exp) {
          var expDate = new Date(payload.exp * 1000);
          var now = new Date();
          var expired = expDate < now;
          expBadge = '<div style="margin-top:8px;">⏰ 过期时间: <strong>' + expDate.toLocaleString('zh-CN') + '</strong> ';
          expBadge += '<span class="exp-badge ' + (expired ? 'expired' : 'valid') + '">' + (expired ? '已过期' : '有效') + '</span></div>';
        } else {
          expBadge = '<div style="margin-top:8px;"><span class="exp-badge noexp">无过期时间 (exp)</span></div>';
        }
      } catch(e) {}

      var html = '';
      // Header section
      html += '<div class="section-card open">';
      html += '<div class="section-header hdr" onclick="this.parentElement.classList.toggle(\'open\')">📋 Header（算法与类型） <span style="font-size:0.75rem;">点击折叠</span></div>';
      html += '<div class="section-body json-highlight">' + highlightJSON(headerFormatted) + '</div>';
      html += '</div>';

      // Payload section
      html += '<div class="section-card open">';
      html += '<div class="section-header pld" onclick="this.parentElement.classList.toggle(\'open\')">📦 Payload（数据载荷） <span style="font-size:0.75rem;">点击折叠</span></div>';
      html += '<div class="section-body json-highlight">' + highlightJSON(payloadFormatted) + '</div>';
      html += expBadge + '</div>';

      // Signature section
      html += '<div class="section-card">';
      html += '<div class="section-header sig" onclick="this.parentElement.classList.toggle(\'open\')">🔏 Signature（签名） <span style="font-size:0.75rem;">点击展开</span></div>';
      html += '<div class="section-body" style="font-size:0.75rem;word-break:break-all;">' + escapeHTML(parts[2]) + '</div>';
      html += '</div>';

      // Raw parts
      html += '<div style="margin-top:8px;font-size:0.75rem;color:var(--text-muted);">';
      html += '<div>Header (Base64URL): <code style="word-break:break-all;">' + escapeHTML(parts[0]) + '</code></div>';
      html += '<div style="margin-top:4px;">Payload (Base64URL): <code style="word-break:break-all;">' + escapeHTML(parts[1]) + '</code></div>';
      html += '</div>';

      resultArea.innerHTML = html;
    }

    document.getElementById('decodeBtn').addEventListener('click', decode);
    document.getElementById('clearBtn').addEventListener('click', function() {
      jwtInput.value = '';
      resultArea.innerHTML = '';
    });

    // Auto-decode on paste
    jwtInput.addEventListener('paste', function() {
      setTimeout(decode, 100);
    });
  </script>
