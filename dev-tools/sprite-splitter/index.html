<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://pagead2.googlesyndication.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-src https://googleads.g.doubleclick.net;">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧩</text></svg>">
  <meta name="description" content="在线Sprite Sheet切割工具 — 将精灵图/雪碧图按行列自动切割为单张图片，支持JSZip打包下载，纯前端处理。">
  <title>Sprite Sheet 切割 · 图片盒子</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    .upload-zone { border: 3px dashed var(--border); border-radius: 16px; padding: 30px 20px;
      text-align: center; cursor: pointer; transition: var(--transition); background: #fafbfc; margin-bottom: 14px; }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: #eef2ff; }
    .config-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
    .config-row label { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
    .config-row input, .config-row select { padding: 6px 8px; border: 2px solid var(--border); border-radius: 6px; font-size: 0.82rem; }
    .config-row input:focus, .config-row select:focus { border-color: var(--accent); outline: none; }
    .main-canvas-wrap { background: #f8fafc; border-radius: 12px; overflow: auto; max-height: 500px;
      display: flex; justify-content: center; align-items: center; border: 2px solid var(--border);
      min-height: 200px; margin: 10px 0; }
    .main-canvas-wrap canvas { display: block; max-width: 100%; height: auto; }
    .preview-box { background: #f8fafc; border-radius: 12px; padding: 10px;
      text-align: center; border: 2px solid var(--border); margin: 8px 0; }
    .preview-box canvas { max-width: 100%; height: auto; }
    .frames-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 8px; max-height: 300px; overflow-y: auto; padding-right: 4px; margin: 8px 0; }
    .frame-item { background: #f8fafc; border-radius: 8px; overflow: hidden; cursor: pointer;
      border: 2px solid var(--border); transition: var(--transition); }
    .frame-item:hover { border-color: var(--accent); transform: scale(1.03); box-shadow: var(--shadow-sm); }
    .frame-item.selected { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .frame-item canvas { width: 100%; height: auto; display: block; }
    .info-text { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 14px; }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../../index.html">🧰 首页</a> <span class="sep">›</span>
      <a href="../../image-tools/index.html">🖼️ 图片盒子</a> <span class="sep">›</span> Sprite Sheet 切割
    </div>

    <div class="card tool-panel">
      <h2 class="panel-title">🧩 Sprite Sheet 切割</h2>
      <p class="panel-desc">在线精灵图/雪碧图切割工具。上传Sprite Sheet，按行列或像素自动切割为单帧，支持动画预览、单帧导出和JSZip打包下载。纯前端处理，图片不上传服务器。</p>

      <input type="file" id="fileInput" accept="image/*" style="display:none;">
      <div class="upload-zone" id="uploadZone">
        <span style="font-size:2rem;display:block;margin-bottom:4px;">📁</span>
        <span style="font-size:0.9rem;" id="uploadLabel">点击或拖拽 Sprite Sheet 图片到此处</span>
      </div>

      <div class="config-row">
        <label>切割模式：</label>
        <select id="splitMode">
          <option value="grid">按行列</option>
          <option value="pixel">按像素</option>
        </select>
        <span id="gridInputs">
          <label style="margin-left:8px;">列</label>
          <input type="number" id="cols" value="4" min="1" max="100" style="width:60px;">
          <label style="margin-left:4px;">行</label>
          <input type="number" id="rows" value="4" min="1" max="100" style="width:60px;">
        </span>
        <span id="pixelInputs" style="display:none;">
          <label style="margin-left:8px;">帧宽</label>
          <input type="number" id="frameW" value="32" min="1" style="width:60px;">
          <label style="margin-left:4px;">帧高</label>
          <input type="number" id="frameH" value="32" min="1" style="width:60px;">
        </span>
      </div>

      <div class="two-col">
        <div>
          <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:6px;">🖼️ 原始图 & 网格</h3>
          <div class="main-canvas-wrap" id="mainContainer">
            <canvas id="mainCanvas"></canvas>
          </div>
          <div class="info-text" id="imageInfo"></div>
        </div>
        <div>
          <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:6px;">🎞️ 帧列表</h3>
          <div class="frames-grid" id="framesContainer">
            <div style="font-size:0.82rem;color:var(--text-muted);padding:20px;text-align:center;">请先上传图片</div>
          </div>
          <div class="info-text" id="frameCountText"></div>

          <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:6px;margin-top:12px;">▶️ 动画预览</h3>
          <div class="preview-box">
            <canvas id="previewCanvas" width="200" height="200"></canvas>
          </div>
          <div class="config-row">
            <label>FPS</label>
            <input type="number" id="fps" value="8" min="1" max="60" style="width:55px;">
            <button class="btn btn-primary btn-sm" id="playBtn">▶ 播放</button>
            <button class="btn btn-sm" id="stopBtn">⏹️ 停止</button>
          </div>

          <div class="btn-row" style="margin-top:10px;">
            <button class="btn btn-primary btn-sm" id="exportFrameBtn">⬇️ 导出当前帧</button>
            <button class="btn btn-primary btn-sm" id="exportAllBtn">📦 导出全部帧 (ZIP)</button>
          </div>
          <p style="font-size:0.75rem;color:var(--text-muted);margin-top:6px;">💡 导出的 ZIP 可在 <a href="../file-compress/index.html" style="color:var(--accent);font-weight:600;">文件压缩/解压</a> 中解包提取</p>
        </div>
      </div>
    </div>

    <div class="ad-unit ad-leaderboard"><span>📢 广告位</span></div>

    <div class="card" style="margin-top:20px;">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:10px;">🖼️ 更多图片工具</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:5px;" id="moreTools"></div>
    </div>
  </div>

  <script src="../../assets/js/common.js"></script>
  <script>
  (function() {
    var fileInput = document.getElementById('fileInput');
    var uploadZone = document.getElementById('uploadZone');
    var uploadLabel = document.getElementById('uploadLabel');
    var splitMode = document.getElementById('splitMode');
    var gridInputs = document.getElementById('gridInputs');
    var pixelInputs = document.getElementById('pixelInputs');
    var colsInput = document.getElementById('cols');
    var rowsInput = document.getElementById('rows');
    var frameWInput = document.getElementById('frameW');
    var frameHInput = document.getElementById('frameH');
    var mainCanvas = document.getElementById('mainCanvas');
    var mainCtx = mainCanvas.getContext('2d');
    var framesContainer = document.getElementById('framesContainer');
    var frameCountText = document.getElementById('frameCountText');
    var previewCanvas = document.getElementById('previewCanvas');
    var previewCtx = previewCanvas.getContext('2d');
    var fpsInput = document.getElementById('fps');
    var playBtn = document.getElementById('playBtn');
    var stopBtn = document.getElementById('stopBtn');
    var exportFrameBtn = document.getElementById('exportFrameBtn');
    var exportAllBtn = document.getElementById('exportAllBtn');
    var imageInfo = document.getElementById('imageInfo');
    var mainContainer = document.getElementById('mainContainer');

    var spriteImage = new Image();
    var frames = [];
    var currentFrameIndex = 0;
    var animationId = null;
    var isPlaying = false;
    var imageLoaded = false;

    uploadZone.addEventListener('click', function() { fileInput.click(); });
    uploadZone.addEventListener('dragover', function(e) {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', function() {
      uploadZone.classList.remove('dragover');
    });
    uploadZone.addEventListener('drop', function(e) {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      var file = e.dataTransfer.files[0];
      if (file) loadImage(file);
    });
    fileInput.addEventListener('change', function() {
      var file = fileInput.files[0];
      if (file) loadImage(file);
    });

    function onCutParamChange() {
      if (splitMode.value === 'grid') {
        gridInputs.style.display = '';
        pixelInputs.style.display = 'none';
      } else {
        gridInputs.style.display = 'none';
        pixelInputs.style.display = '';
      }
      if (imageLoaded) cutSprite();
    }

    splitMode.addEventListener('change', onCutParamChange);
    colsInput.addEventListener('input', onCutParamChange);
    rowsInput.addEventListener('input', onCutParamChange);
    frameWInput.addEventListener('input', onCutParamChange);
    frameHInput.addEventListener('input', onCutParamChange);

    fpsInput.addEventListener('input', function() {
      if (isPlaying) {
        stopAnimation();
        playAnimation();
      }
    });

    playBtn.addEventListener('click', playAnimation);
    stopBtn.addEventListener('click', stopAnimation);
    exportFrameBtn.addEventListener('click', exportCurrentFrame);
    exportAllBtn.addEventListener('click', exportAllFrames);

    function loadImage(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        spriteImage.onload = function() {
          imageLoaded = true;
          displayMainImage();
          cutSprite();
          uploadLabel.textContent = file.name;
        };
        spriteImage.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function displayMainImage() {
      mainCanvas.width = spriteImage.width;
      mainCanvas.height = spriteImage.height;
      mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
      mainCtx.drawImage(spriteImage, 0, 0);
      imageInfo.textContent = '尺寸: ' + spriteImage.width + ' × ' + spriteImage.height + ' px';
    }

    function cutSprite() {
      if (!imageLoaded) { showToast('请先上传一张图片'); return; }

      var imgW = spriteImage.width;
      var imgH = spriteImage.height;
      var frameWidth, frameHeight, cols, rows;

      if (splitMode.value === 'grid') {
        cols = parseInt(colsInput.value, 10) || 1;
        rows = parseInt(rowsInput.value, 10) || 1;
        if (cols < 1) cols = 1;
        if (rows < 1) rows = 1;
        frameWidth = Math.floor(imgW / cols);
        frameHeight = Math.floor(imgH / rows);
        frameWInput.value = frameWidth;
        frameHInput.value = frameHeight;
      } else {
        frameWidth = parseInt(frameWInput.value, 10) || 32;
        frameHeight = parseInt(frameHInput.value, 10) || 32;
        if (frameWidth < 1) frameWidth = 1;
        if (frameHeight < 1) frameHeight = 1;
        cols = Math.floor(imgW / frameWidth);
        rows = Math.floor(imgH / frameHeight);
        colsInput.value = cols;
        rowsInput.value = rows;
      }

      frames = [];
      framesContainer.innerHTML = '';

      mainCanvas.width = imgW;
      mainCanvas.height = imgH;
      mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
      mainCtx.drawImage(spriteImage, 0, 0);
      mainCtx.strokeStyle = '#ef4444';
      mainCtx.lineWidth = 2;

      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          var x = c * frameWidth;
          var y = r * frameHeight;
          mainCtx.strokeRect(x, y, frameWidth, frameHeight);

          var frameCanvas = document.createElement('canvas');
          frameCanvas.width = frameWidth;
          frameCanvas.height = frameHeight;
          var fCtx = frameCanvas.getContext('2d');
          fCtx.drawImage(spriteImage, x, y, frameWidth, frameHeight, 0, 0, frameWidth, frameHeight);

          frames.push({ canvas: frameCanvas, index: frames.length });

          var thumbWrapper = document.createElement('div');
          thumbWrapper.className = 'frame-item';
          var thumbCanvas = document.createElement('canvas');
          thumbCanvas.width = frameWidth;
          thumbCanvas.height = frameHeight;
          var thumbCtx = thumbCanvas.getContext('2d');
          thumbCtx.drawImage(frameCanvas, 0, 0);
          thumbWrapper.appendChild(thumbCanvas);
          thumbWrapper.addEventListener('click', (function(idx) {
            return function() {
              currentFrameIndex = idx;
              drawPreviewFrame(idx);
              var prevSelected = framesContainer.querySelector('.frame-item.selected');
              if (prevSelected) prevSelected.classList.remove('selected');
              thumbWrapper.classList.add('selected');
            };
          })(frames.length - 1));
          framesContainer.appendChild(thumbWrapper);
        }
      }

      frameCountText.textContent = '共 ' + frames.length + ' 帧，每帧 ' + frameWidth + '×' + frameHeight + ' px';

      stopAnimation();
      currentFrameIndex = 0;
      if (frames.length > 0) {
        drawPreviewFrame(0);
        var firstThumb = framesContainer.querySelector('.frame-item');
        if (firstThumb) firstThumb.classList.add('selected');
      }
    }

    function drawPreviewFrame(index) {
      if (frames.length === 0) return;
      var frame = frames[index];
      previewCanvas.width = frame.canvas.width;
      previewCanvas.height = frame.canvas.height;
      previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
      previewCtx.drawImage(frame.canvas, 0, 0);
    }

    function playAnimation() {
      if (frames.length === 0) { showToast('没有帧可播放'); return; }
      if (isPlaying) return;
      isPlaying = true;
      var fps = Math.max(1, parseInt(fpsInput.value, 10) || 8);
      var interval = 1000 / fps;
      var lastTime = 0;

      function step(timestamp) {
        if (!isPlaying) return;
        if (!lastTime) lastTime = timestamp;
        var elapsed = timestamp - lastTime;
        if (elapsed >= interval) {
          drawPreviewFrame(currentFrameIndex);
          currentFrameIndex = (currentFrameIndex + 1) % frames.length;
          lastTime = timestamp;
        }
        animationId = requestAnimationFrame(step);
      }
      animationId = requestAnimationFrame(step);
    }

    function stopAnimation() {
      isPlaying = false;
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }

    function exportCurrentFrame() {
      if (frames.length === 0) { showToast('没有可导出的帧'); return; }
      var frame = frames[currentFrameIndex];
      downloadCanvas(frame.canvas, 'frame_' + currentFrameIndex + '.png');
    }

    async function exportAllFrames() {
      if (frames.length === 0) { showToast('没有可导出的帧'); return; }
      if (typeof JSZip === 'undefined') { showToast('JSZip 库加载失败，请检查网络连接'); return; }
      var zip = new JSZip();
      await Promise.all(frames.map(function(frame, idx) {
        return new Promise(function(resolve) {
          frame.canvas.toBlob(function(blob) {
            zip.file('frame_' + idx + '.png', blob);
            resolve();
          }, 'image/png');
        });
      }));
      var content = await zip.generateAsync({ type: 'blob' });
      var url = URL.createObjectURL(content);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'sprites.zip';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('✅ 已导出: sprites.zip');
    }

    function downloadCanvas(canvas, filename) {
      canvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('✅ 已导出: ' + filename);
      }, 'image/png');
    }

    window.addEventListener('beforeunload', function() {
      stopAnimation();
    });

    document.getElementById('moreTools').innerHTML = [
      { h: '../svg-tool', i: '🎨', n: 'SVG 预览转换' },
      { h: '../image-crop', i: '✂️', n: '图片裁剪缩放' },
      { h: '../color-picker', i: '💉', n: '图片颜色拾取' },
      { h: '../color-convert', i: '🎨', n: '颜色转换' },
      { h: '../image-watermark', i: '💧', n: '图片水印平铺' },
      { h: '../watermark-removal', i: '🖌️', n: '水印去除' },
      { h: '../image-stitch', i: '🖼️', n: '图片拼长图' },
    ].map(function(t) {
      return '<a href="' + t.h + '/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>' + t.i + '</span> ' + t.n + '</a>';
    }).join('');
  })();
  </script>
</body>
</html>
