    <div class="card tool-panel">
      <h2 class="panel-title">📊 字数统计</h2>
      <p class="panel-desc">在线字数统计工具。粘贴或输入文本后实时显示总字符数、单词数、中文字数、行数、段落数等详细统计。支持中英文混合统计，适合文案写作、翻译字数核对等场景。</p>
      <textarea class="form-input" id="wcInput" placeholder="输入或粘贴文本..."></textarea>
      <div class="result-box show" style="display:flex;gap:24px;justify-content:center;margin-top:12px;">
        <div>字符 <b id="wcChars">0</b></div>
        <div>单词 <b id="wcWords">0</b></div>
        <div>行 <b id="wcLines">0</b></div>
      </div>
    </div>

    <div class="ad-unit ad-leaderboard">
      <span>📢 广告位</span>
    </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    const inp = document.getElementById('wcInput');
    inp.oninput = () => {
      const t = inp.value;
      document.getElementById('wcChars').textContent = t.length;
      document.getElementById('wcWords').textContent = t.trim() ? t.trim().split(/\s+/).length : 0;
      document.getElementById('wcLines').textContent = t ? t.split('\n').length : 0;
    };
  </script>
