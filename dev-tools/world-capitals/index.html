    .search-input { margin-bottom: 12px; }

    .cat-tab { padding: 6px 14px; border: 2px solid var(--border); border-radius: 20px;
      background: #fff; cursor: pointer; font-size: 0.78rem; font-weight: 500;
      transition: var(--transition); white-space: nowrap; }
    .cat-tab:hover { border-color: var(--accent); }
    .cat-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .country-table { width: 100%; border-collapse: collapse; }
    .country-table th { text-align: left; padding: 8px 12px; font-size: 0.72rem;
      color: var(--text-muted); font-weight: 600; border-bottom: 2px solid var(--border); background: #f8fafc; }
    .country-table td { padding: 6px 12px; font-size: 0.82rem; border-bottom: 1px solid #f1f5f9; }
    .country-table tr { cursor: pointer; transition: var(--transition); }
    .country-table tr:hover { background: #eef2ff; }
    .country-table .flag { font-size: 1.2rem; width: 30px; text-align: center; }
    .country-table .country { font-weight: 600; }
    .country-table .capital { color: var(--accent); font-weight: 500; }
    .country-table .continent-tag { font-size: 0.68rem; padding: 2px 8px; border-radius: 10px;

    .count-badge { font-size: 0.72rem; color: var(--text-muted); margin-left: 4px; }
    .table-wrap { max-height: 70vh; overflow-y: auto; border-radius: 10px; border: 1px solid var(--border); }
    .table-wrap thead { position: sticky; top: 0; z-index: 1; }
    .toast-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 8px 20px; border-radius: 20px;
      font-size: 0.85rem; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 999; }
    .toast-hint.show { opacity: 1; }
    @media (max-width:600px) {
      .country-table td, .country-table th { padding: 4px 6px; font-size: 0.72rem; }
    }

    var allCountries = [];

    catKeys.forEach(function(cat) {
      categories[cat].forEach(function(c) {
        allCountries.push({ flag: c[0], country: c[1], capital: c[2], continent: cat });
      });
    });

    var currentCat = 'all';
    var searchQuery = '';

    var searchInput = document.getElementById('searchInput');
    var categoryTabs = document.getElementById('categoryTabs');
    var countryBody = document.getElementById('countryBody');
    var toastHint = document.getElementById('toastHint');

    function renderCategoryTabs() {
      var html = '<span class="cat-tab active" data-cat="all">全部 <span class="count-badge">(' + allCountries.length + ')</span></span>';
      catKeys.forEach(function(cat) {
        html += '<span class="cat-tab" data-cat="' + cat + '">' + cat + ' <span class="count-badge">(' + categories[cat].length + ')</span></span>';
      });
      categoryTabs.innerHTML = html;

      categoryTabs.querySelectorAll('.cat-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          categoryTabs.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); });
          tab.classList.add('active');
          currentCat = tab.dataset.cat;
          renderTable();
        });
      });
    }

    function renderTable() {
      var filtered = allCountries.filter(function(c) {
        var matchCat = currentCat === 'all' || c.continent === currentCat;
        var matchSearch = !searchQuery || c.country.indexOf(searchQuery) !== -1 || c.capital.indexOf(searchQuery) !== -1;
        return matchCat && matchSearch;
      });

      countryBody.innerHTML = filtered.map(function(c) {
        return '<tr title="点击复制: ' + c.country + ' - ' + c.capital + '" data-text="' + escapeHTML(c.country + ' - ' + c.capital) + '"><td class="flag">' + c.flag + '</td><td class="country">' + c.country + '</td><td class="capital">' + c.capital + '</td></tr>';
      }).join('');

      countryBody.querySelectorAll('tr').forEach(function(row) {
        row.addEventListener('click', function() {
          navigator.clipboard.writeText(this.dataset.text).then(function() {
            toastHint.textContent = '✅ 已复制: ' + this.dataset.text;
            toastHint.classList.add('show');
            clearTimeout(toastHint._t);
            toastHint._t = setTimeout(function() { toastHint.classList.remove('show'); }, 1500);
          }.bind(this));
        });
      });
    }

    searchInput.addEventListener('input', function() {
      searchQuery = this.value.trim();
      renderTable();
    });
