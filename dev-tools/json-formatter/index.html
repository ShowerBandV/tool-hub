    </div>

    </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    const input = document.getElementById('jsonInput'), output = document.getElementById('jsonOutput');
    function highlight(json) {
      return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^"\\])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
          let cls = 'json-number';
          if (/^"/.test(m)) cls = /:$/.test(m) ? 'json-key' : 'json-string';
          else if (/true|false/.test(m)) cls = 'json-boolean';
          else if (/null/.test(m)) cls = 'json-null';
          return '<span class="'+cls+'">'+m+'</span>';
        });
    }
    document.getElementById('jsonFormat').onclick = () => {
      try { const obj = JSON.parse(input.value); output.className='result-box json-highlight show'; output.innerHTML=highlight(JSON.stringify(obj,null,2))+'<button class="copy-btn">📋</button><button class="export-btn">⬇️</button>'; bindBtns(output, ()=>JSON.stringify(obj,null,2), 'formatted.json'); }
      catch(e) { output.className='result-box show'; output.innerHTML='<span style="color:var(--danger)">'+e.message+'</span>'; }
    };
    document.getElementById('jsonCompress').onclick = () => {
      try { const txt = JSON.stringify(JSON.parse(input.value)); output.className='result-box show'; output.textContent = txt; output.innerHTML += '<button class="copy-btn">📋</button><button class="export-btn">⬇️</button>'; bindBtns(output, ()=>txt, 'compressed.json'); }
      catch(e) { output.className='result-box show'; output.textContent = e.message; }
    };
    document.getElementById('jsonValidate').onclick = () => {
      try { const o = JSON.parse(input.value); output.className='result-box show'; output.innerHTML='<span style="color:var(--success)">✅ 有效 ('+(Array.isArray(o)?'Array':typeof o)+')</span>'; }
      catch(e) { output.className='result-box show'; output.innerHTML='<span style="color:var(--danger)">❌ '+e.message+'</span>'; }
    };
    function bindBtns(el, getContent, filename) {
      el.querySelector('.copy-btn')?.addEventListener('click', () => navigator.clipboard.writeText(getContent()));
      el.querySelector('.export-btn')?.addEventListener('click', () => downloadText(getContent(), filename));
    }
  </script>
