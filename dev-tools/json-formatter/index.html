    .btn-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .btn-action { padding: 10px 20px; border-radius: 10px; border: 2px solid var(--border);
      font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; gap: 6px; background: #fff; }
    .btn-action:hover { border-color: var(--accent); background: #eef2ff; }
    .btn-action.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-action.primary:hover { background: #4338ca; }
    .btn-action.danger { background: #ef4444; color: #fff; border-color: #ef4444; }
    .btn-action.danger:hover { background: #dc2626; }
  </style>

          </div>
        </div>

    </div>

    <div class="ad-unit ad-leaderboard">
      <span>📢 广告位</span>
    </div>

        <a href="../html-symbols/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🆎</span> HTML 符号</a>

  <script src="../../assets/js/common.js"></script>
  <script>
    const input = document.getElementById('jsonInput');
    const output = document.getElementById('jsonOutput');
    let currentTab = 'format';
    let lastResult = '';

    function highlightJSON(json) {
      return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^"\\])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(m) {
          var cls = 'json-number';
          if (/^"/.test(m)) { cls = /:$/.test(m) ? 'json-key' : 'json-string'; }
          else if (/true|false/.test(m)) { cls = 'json-boolean'; }
          else if (/null/.test(m)) { cls = 'json-null'; }
          return '<span class="'+cls+'">'+m+'</span>';
        });
    }

    function process() {
      var val = input.value.trim();
      if (!val) { output.className = 'output-area'; output.innerHTML = ''; lastResult = ''; return; }

      if (currentTab === 'format') {
        try {
          var obj = JSON.parse(val);
          var formatted = JSON.stringify(obj, null, 2);
          lastResult = formatted;
          output.className = 'output-area json-highlight';
          output.innerHTML = highlightJSON(formatted);
        } catch(e) {
          output.className = 'output-area error';
          output.textContent = '❌ ' + e.message;
          lastResult = '';
        }
      } else if (currentTab === 'compress') {
        try {
          var compressed = JSON.stringify(JSON.parse(val));
          lastResult = compressed;
          output.className = 'output-area';
          output.textContent = compressed;
        } catch(e) {
          output.className = 'output-area error';
          output.textContent = '❌ ' + e.message;
          lastResult = '';
        }
      } else if (currentTab === 'validate') {
        try {
          var o = JSON.parse(val);
          var type = Array.isArray(o) ? 'Array' : typeof o;
          var count = Array.isArray(o) ? o.length : Object.keys(o).length;
          lastResult = '';
          output.className = 'output-area success';
          output.innerHTML = '<span style="font-weight:700;">✅ JSON 有效</span>\n类型: ' + type + '\n' + (Array.isArray(o) ? '元素数: ' : '键数: ') + count;
        } catch(e) {
          output.className = 'output-area error';
          output.textContent = '❌ ' + e.message;
          lastResult = '';
        }
      }
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        process();
      });
    });

    // Auto-process on input
    var debounceTimer;
    input.addEventListener('input', function() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(process, 200);
    });

    // Copy button
    document.getElementById('copyBtn').addEventListener('click', function() {
      if (!lastResult && currentTab === 'validate') {
        lastResult = output.textContent;
      }
      if (lastResult) {
        navigator.clipboard.writeText(lastResult).then(function() {
          showToast('✅ 已复制到剪贴板');
        }).catch(function() {
          showToast('❌ 复制失败');
        });
      } else {
        showToast('⚠️ 没有可复制的结果');
      }
    });

    // Export button
    document.getElementById('exportBtn').addEventListener('click', function() {
      if (!lastResult && currentTab === 'validate') {
        lastResult = output.textContent;
      }
      if (lastResult) {
        var ext = currentTab === 'compress' ? 'compressed.json' : 'formatted.json';
        downloadText(lastResult, ext);
      } else {
        showToast('⚠️ 没有可导出的结果');
      }
    });

    // Clear button
    document.getElementById('clearBtn').addEventListener('click', function() {
      input.value = '';
      output.className = 'output-area';
      output.innerHTML = '';
      lastResult = '';
    });

    // Initial process if there's pre-filled content
    process();
  </script>
