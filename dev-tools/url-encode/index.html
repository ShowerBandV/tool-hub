        <button class="btn btn-primary" id="urlEnc">编码</button>

  <script src="../../assets/js/common.js"></script>
  <script>
    const res = document.getElementById('urlRes');
    document.getElementById('urlEnc').onclick = () => {
      res.textContent = encodeURIComponent(document.getElementById('urlInput').value);
      res.className = 'result-box show';
    };
    document.getElementById('urlDec').onclick = () => {
      try {
        res.textContent = decodeURIComponent(document.getElementById('urlInput').value);
        res.className = 'result-box show';
      } catch(e) { res.textContent = e.message; res.className = 'result-box show'; }
    };
  </script>
