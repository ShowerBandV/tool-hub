    var toastHint = document.getElementById('toastHint');

    function renderHexagrams() {
      var query = (searchInput.value || '').trim().toLowerCase();

      var filtered = hexagrams.filter(function(h) {
        if (!query) return true;
        return h.name.indexOf(query) !== -1 ||
               h.num.toString().indexOf(query) !== -1 ||
               h.meaning.indexOf(query) !== -1 ||
               h.up.indexOf(query) !== -1 ||
               h.down.indexOf(query) !== -1;
      });

      hexGrid.innerHTML = filtered.map(function(h) {
        return '<div class="hex-card" title="点击复制: 第' + h.num + '卦 ' + h.name + '" data-text="第' + h.num + '卦 ' + h.name + '"><div class="hex-symbol">' + h.sym + '</div><div class="hex-info"><div class="hex-name">第' + h.num + '卦 ' + h.name + '</div><div class="hex-trigrams">上' + h.up + ' · 下' + h.down + '</div><div class="hex-meaning">' + h.meaning + '</div></div></div>';
      }).join('');

      hexGrid.querySelectorAll('.hex-card').forEach(function(card) {
        card.addEventListener('click', function() {
          navigator.clipboard.writeText(this.dataset.text).then(function() {
            toastHint.textContent = '✅ 已复制: ' + this.dataset.text;
            toastHint.classList.add('show');
            clearTimeout(toastHint._t);
            toastHint._t = setTimeout(function() { toastHint.classList.remove('show'); }, 1500);
          }.bind(this));
        });
      });
