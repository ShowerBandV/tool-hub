<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self';">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>рҹҺІ</text></svg>">
  <meta name="description" content="йҡҸжңәжөӢиҜ•ж•°жҚ®з”ҹжҲҗеҷЁ вҖ” еңЁзәҝз”ҹжҲҗдёӯж–Үе§“еҗҚе’ҢжүӢжңәеҸ·зӯүжөӢиҜ•ж•°жҚ®пјҢж”ҜжҢҒеҜјеҮәCSVгҖӮ">
  <title>йҡҸжңәж•°жҚ®з”ҹжҲҗ В· ејҖеҸ‘иҖ…зӣ’еӯҗ</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .output-area {
      background: #f8fafc; border: 2px solid var(--border);
      border-radius: var(--radius-xs); padding: 14px 16px;
      font-family: var(--font-mono); font-size: 0.85rem;
      line-height: 1.6; min-height: 80px;
      white-space: pre-wrap; word-break: break-all;
      color: var(--text); max-height: 400px; overflow-y: auto;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../../index.html">рҹ§° йҰ–йЎө</a> <span class="sep">вҖә</span>
      <a href="../index.html">рҹӣ пёҸ ејҖеҸ‘иҖ…зӣ’еӯҗ</a> <span class="sep">вҖә</span> йҡҸжңәж•°жҚ®з”ҹжҲҗ
    </div>
    <header class="app-header">
      <div class="app-logo">
        <span class="logo-icon">рҹҺІ</span>
        <span class="app-title">йҡҸжңәжөӢиҜ•ж•°жҚ®з”ҹжҲҗ</span>
      </div>
      <p class="app-subtitle">еҝ«йҖҹз”ҹжҲҗдёӯж–Үе§“еҗҚгҖҒжүӢжңәеҸ·зӯүжөӢиҜ•ж•°жҚ®пјҢж”ҜжҢҒеҜјеҮәCSV</p>
    </header>
    <div class="card tool-panel">
      <div class="input-row">
        <div class="form-group">
          <label class="form-label">з”ҹжҲҗж•°йҮҸ</label>
          <input type="number" class="form-input" id="rd-count" value="10" min="1" max="100">
        </div>
        <div class="form-group">
          <label class="form-label">ж•°жҚ®зұ»еһӢ</label>
          <select class="form-select" id="rd-type">
            <option value="both">е§“еҗҚ + жүӢжңәеҸ·</option>
            <option value="name">д»…е§“еҗҚ</option>
            <option value="phone">д»…жүӢжңәеҸ·</option>
          </select>
        </div>
        <div class="form-group" style="display:flex;align-items:flex-end;min-width:100px;">
          <button class="btn btn-primary btn-block" onclick="generateData()">рҹҺІ з”ҹжҲҗж•°жҚ®</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">
        <button class="btn btn-outline btn-sm" onclick="copyResult('rd-result')">рҹ“Ӣ еӨҚеҲ¶е…ЁйғЁ</button>
        <button class="btn btn-outline btn-sm" onclick="exportCSV()">рҹ“Ҙ еҜјеҮәCSV</button>
      </div>
      <div class="output-area" id="rd-result">зӮ№еҮ»"з”ҹжҲҗж•°жҚ®"жҢүй’®ејҖе§Ӣз”ҹжҲҗ...</div>
    </div>
  </div>
  <script src="../../assets/js/common.js"></script>
  <script>
    const SURNAMES = 'иөөй’ұеӯҷжқҺе‘Ёеҗҙйғ‘зҺӢеҶҜйҷҲиӨҡеҚ«и’ӢжІҲйҹ©жқЁжңұз§Ұе°Өи®ёдҪ•еҗ•ж–Ҫеј еӯ”жӣ№дёҘеҚҺйҮ‘йӯҸйҷ¶е§ңжҲҡи°ўйӮ№е–»жҹҸж°ҙзӘҰз« дә‘иӢҸжҪҳи‘ӣеҘҡиҢғеҪӯйғҺйІҒйҹҰжҳҢй©¬иӢ—еҮӨиҠұж–№дҝһд»»иўҒжҹій…ҶйІҚеҸІе”җиҙ№е»үеІ‘и–ӣйӣ·иҙәеҖӘжұӨж»•ж®·зҪ—жҜ•йғқйӮ¬е®үеёёд№җдәҺж—¶еӮ…зҡ®еҚһйҪҗеә·дјҚдҪҷе…ғеҚңйЎҫеӯҹе№ій»„';
    const GIVEN_NAMES = ['дјҹ','иҠі','еЁң','з§ҖиӢұ','ж•Ҹ','йқҷ','дёҪ','ејә','зЈҠ','еҶӣ','жҙӢ','еӢҮ','иүі','жқ°','еЁҹ','ж¶ӣ','жҳҺ','и¶…','иҫү','еҲҡ','жЎӮиӢұ','ж–Ү','еҚҺ','йЈһ','й№Ҹ','ж–Ң','е®Ү','й‘«','жө©','йӣӘ','жҷЁ','жӮҰ','зқҝ','еҚҡ','ж¶ө','зҖҡ','е“І','иҗұ','зҗі','з‘¶','зҗӘ','еҪӨ','йӘҸ','йҖё','е®ё','жҒә','йҹ¬','зҺҘ','жў“','иҪ©','е®ҮиҪ©','еӯҗж¶ө','йӣЁжіҪ','жІҗиҫ°','иӢҘжӣҰ','иҜӯе«Ј','еӨ©дҪ‘','йқҷжҖЎ','жҖқиҝң','дёҖйёЈ','иҜ—ж¶ө','еҳүзҗӘ','жҳҺе“І','еҝ—иҝң','ж–ҮеҚҡ','жө·зҮ•','зәўжў…','е»әеҚҺ','еӣҪејә','еҝ—ејә'];
    const PHONE_PREFIX = ['130','131','132','133','134','135','136','137','138','139','150','151','152','153','155','156','157','158','159','176','177','178','180','181','182','183','185','186','187','188','189','198','199'];

    function generateData() {
      const count = parseInt(document.getElementById('rd-count').value) || 10;
      const type = document.getElementById('rd-type').value;
      const result = [];
      for (let i = 0; i < count; i++) {
        const surname = SURNAMES[Math.floor(Math.random() * SURNAMES.length)];
        const given = GIVEN_NAMES[Math.floor(Math.random() * GIVEN_NAMES.length)];
        const prefix = PHONE_PREFIX[Math.floor(Math.random() * PHONE_PREFIX.length)];
        let phone = prefix;
        for (let j = 0; j < 8; j++) phone += Math.floor(Math.random() * 10);
        if (type === 'name') result.push(surname + given);
        else if (type === 'phone') result.push(phone);
        else result.push((surname + given) + '\t' + phone);
      }
      document.getElementById('rd-result').textContent = result.join('\n') + '\n\nе…ұ ' + count + ' жқЎ';
    }

    function copyResult(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const text = el.textContent || el.innerText;
      navigator.clipboard.writeText(text).then(() => showToast('вң… е·ІеӨҚеҲ¶'));
    }

    function exportCSV() {
      const el = document.getElementById('rd-result');
      const raw = el.textContent.split('\n').filter(l => l.trim() && !l.startsWith('е…ұ'));
      if (raw.length === 0) { showToast('вҡ пёҸ жІЎжңүж•°жҚ®еҸҜеҜјеҮә'); return; }
      const csv = '\uFEFF' + 'е§“еҗҚ,жүӢжңәеҸ·\n' + raw.map(l => l.includes('\t') ? l.replace('\t', ',') : l + ',').join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'test_data.csv';
      a.click(); URL.revokeObjectURL(url);
      showToast('рҹ“Ҙ CSVе·ІдёӢиҪҪ');
    }

    generateData();
  </script>
</body>
</html>
