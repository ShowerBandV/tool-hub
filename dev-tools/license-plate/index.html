    function renderPlates() {
      var query = (searchInput.value || '').trim().toLowerCase();

      var filtered = data.filter(function(p) {
        if (!query) return true;
        if (p.abbr.indexOf(query) !== -1 || p.name.indexOf(query) !== -1) return true;
        return p.cities.some(function(c) {
          return c[0].toLowerCase().indexOf(query) !== -1 || c[1].indexOf(query) !== -1;
        });
      });

      plateGrid.innerHTML = filtered.map(function(p) {
        var cityHtml = p.cities.map(function(c) {
          return '<div class="city-item" title="点击复制 ' + c[0] + '" data-code="' + c[0] + '"><span class="code">' + c[0] + '</span><span class="name">' + c[1] + '</span></div>';
        }).join('');
        return '<div class="province-card"><div class="province-header"><span class="abbr">' + p.abbr + '</span>' + p.name + '省/市/自治区</div><div class="city-list">' + cityHtml + '</div></div>';
      }).join('');

      plateGrid.querySelectorAll('.city-item').forEach(function(item) {
        item.addEventListener('click', function() {
          navigator.clipboard.writeText(this.dataset.code).then(function() {
            toastHint.textContent = '✅ 已复制: ' + this.dataset.code;
            toastHint.classList.add('show');
            clearTimeout(toastHint._t);
            toastHint._t = setTimeout(function() { toastHint.classList.remove('show'); }, 1500);
          }.bind(this));
        });
      });
    }
