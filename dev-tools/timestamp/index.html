  <script src="../../assets/js/common.js"></script>
  <script>
    const tsIn = document.getElementById('tsInput'), dtIn = document.getElementById('dtInput'), res = document.getElementById('tsResult');
    function set(ts) {
      const d = new Date(ts*1000);
      res.innerHTML = 'UTC: '+d.toUTCString()+'<br>本地: '+d.toLocaleString();
      dtIn.value = d.toISOString().slice(0,16);
    }
    tsIn.oninput = () => { const v = parseInt(tsIn.value); if(v) set(v); };
    dtIn.onchange = () => { const d = new Date(dtIn.value); tsIn.value = Math.floor(d.getTime()/1000); set(tsIn.value); };
    const now = Math.floor(Date.now()/1000); tsIn.value = now; set(now);
  </script>
