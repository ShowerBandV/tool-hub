<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-src https://googleads.g.doubleclick.net;">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">
  <meta name="description" content="在线分数计算器，支持多个分数的加减乘除四则运算，自动化简最终结果。">
  <title>分数计算器 - 在线分数四则运算化简 · 计算器盒子</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .op-row { display: flex; gap: 8px; align-items: center; margin: 8px 0; flex-wrap: wrap; }
    .op-tag { padding: 6px 14px; border-radius: 8px; background: #f0f0f0; font-size: 0.85rem; font-weight: 700; }
    .frac-input { display: flex; align-items: center; gap: 4px; }
    .frac-input input { width: 60px; padding: 6px; border: 2px solid var(--border); border-radius: 6px;
      font-size: 0.85rem; text-align: center; }
    .frac-bar { font-size: 1.2rem; font-weight: 300; color: var(--text-muted); margin: 0 2px; }
    .result-card { background: linear-gradient(135deg, #eef2ff, #faf5ff); border-radius: 16px;
      padding: 20px; text-align: center; margin-top: 12px; }
    .result-val { font-size: 2rem; font-weight: 800; color: var(--accent); font-family: var(--font-mono); }
    .history { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../../index.html">🧰 首页</a> <span class="sep">›</span>
      <a href="../index.html">🧮 计算器盒子</a> <span class="sep">›</span> 分数计算器
    </div>

    <div class="card tool-panel">
      <h2 class="panel-title">÷ 分数计算器</h2>
      <p class="panel-desc">在线分数计算器，支持多个分数的加减乘除四则运算，自动通分并化简最终结果为最简分数形式。</p>

      <div class="form-label">分数 1</div>
      <div class="frac-input">
        <input type="number" id="num1" value="1" placeholder="分子">
        <span class="frac-bar">/</span>
        <input type="number" id="den1" value="2" placeholder="分母">
      </div>

      <div class="form-label" style="margin-top:8px;">运算符</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="op-tag" data-op="+" style="cursor:pointer;">+</button>
        <button class="op-tag" data-op="-" style="cursor:pointer;">−</button>
        <button class="op-tag" data-op="*" style="cursor:pointer;">×</button>
        <button class="op-tag" data-op="/" style="cursor:pointer;">÷</button>
      </div>

      <div class="form-label" style="margin-top:8px;">分数 2</div>
      <div class="frac-input">
        <input type="number" id="num2" value="1" placeholder="分子">
        <span class="frac-bar">/</span>
        <input type="number" id="den2" value="3" placeholder="分母">
      </div>

      <button class="btn btn-primary" id="calcBtn" style="margin-top:10px;">计算</button>

      <div class="result-card" id="resultCard" style="display:none;">
        <div style="font-size:0.85rem;color:var(--text-muted);">结果</div>
        <div class="result-val" id="resultVal"></div>
        <div class="history" id="historyText"></div>
      </div>
    </div>

    <div class="ad-unit ad-leaderboard"><span>📢 广告位</span></div>
    <div class="card" style="margin-top:20px;"><h3 style="font-size:1rem;font-weight:700;margin-bottom:10px;">🧮 更多计算器</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:5px;" id="moreTools"></div></div>
  </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    var operator = '+';
    function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while(b) { var t = b; b = a % b; a = t; } return a; }
    function simplify(n, d) { var g = gcd(n, d); return { n: n/g, d: d/g }; }

    document.querySelectorAll('.op-tag').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.op-tag').forEach(function(b) { b.style.background = '#f0f0f0'; b.style.color = ''; });
        operator = this.dataset.op;
        this.style.background = 'var(--accent)';
        this.style.color = '#fff';
      });
    });

    document.getElementById('calcBtn').addEventListener('click', function() {
      var n1 = parseInt(document.getElementById('num1').value);
      var d1 = parseInt(document.getElementById('den1').value);
      var n2 = parseInt(document.getElementById('num2').value);
      var d2 = parseInt(document.getElementById('den2').value);

      if (isNaN(n1)||isNaN(d1)||isNaN(n2)||isNaN(d2)||d1===0||d2===0) {
        showToast('请输入有效分数（分母不能为0）'); return;
      }

      var rn, rd;
      var s1 = d1 < 0 ? -1 : 1, s2 = d2 < 0 ? -1 : 1;
      n1 *= s1; n2 *= s2; d1 = Math.abs(d1); d2 = Math.abs(d2);

      switch (operator) {
        case '+': rn = n1*d2 + n2*d1; rd = d1*d2; break;
        case '-': rn = n1*d2 - n2*d1; rd = d1*d2; break;
        case '*': rn = n1*n2; rd = d1*d2; break;
        case '/': rn = n1*d2; rd = d1*n2; break;
      }

      if (rd < 0) { rn = -rn; rd = -rd; }
      var s = simplify(rn, rd);
      var decimal = (s.n / s.d).toFixed(6);
      var hist = n1 + '/' + d1 + ' ' + operator + ' ' + n2 + '/' + d2 + ' = ' + rn + '/' + rd;

      document.getElementById('resultVal').textContent = s.n + ' / ' + s.d + (s.d !== 1 ? ' ≈ ' + decimal : ' = ' + s.n);
      document.getElementById('historyText').textContent = '计算过程：' + hist + ' → 化简：' + s.n + '/' + s.d;
      document.getElementById('resultCard').style.display = '';
    });

    document.getElementById('moreTools').innerHTML = [
      { h: 'gcd-lcm', i: '🔢', n: '公因数/公倍数' },
      { h: 'sequences', i: '📈', n: '数列计算器' },
      { h: 'time-calc', i: '🕐', n: '时间加减' },
      { h: 'factorial', i: '!', n: '阶乘计算器' },
      { h: 'text-set', i: '∩∪', n: '文本交集/差集' },
      { h: 'permutations', i: '🔀', n: '列表全排列' },
      { h: 'zodiac-lookup', i: '🐲', n: '生肖查询' },
      { h: 'kinship-calculator', i: '👨‍👩‍👧‍👦', n: '家庭称谓' },
    ].map(function(t) { return '<a href="../' + t.h + '/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>' + t.i + '</span> ' + t.n + '</a>'; }).join('');
  </script>
</body>
</html>
