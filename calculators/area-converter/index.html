<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-src https://googleads.g.doubleclick.net;">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">
  <meta name="description" content="在线面积单位换算器，支持平方米、平方千米、公顷、亩、英亩、平方英尺等常用面积单位的实时互转。">
  <title>面积换算 · 计算器盒子</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .converter-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .converter-row .form-group { flex: 1; min-width: 140px; }
    .swap-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border);
      background: #fff; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center;
      justify-content: center; transition: var(--transition); flex-shrink: 0; margin-bottom: 4px; }
    .swap-btn:hover { border-color: var(--accent); transform: rotate(180deg); }
    .result-big { font-size: 2rem; font-weight: 800; text-align: center; padding: 20px;
      background: var(--bg); border-radius: 12px; margin-top: 12px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../../index.html">🧰 首页</a> <span class="sep">›</span>
      <a href="../index.html">🧮 计算器盒子</a> <span class="sep">›</span> 面积换算
    </div>

    <div class="card tool-panel">
      <h2 class="panel-title">📐 面积换算</h2>
      <p class="panel-desc">在线面积单位换算器，支持平方米、平方千米、公顷、亩、英亩、平方英尺、平方英寸等常用面积单位的实时互转。输入数值后自动换算所有单位。</p>

      <div class="converter-row">
        <div class="form-group">
          <label class="form-label">输入数值</label>
          <input type="number" class="form-input" id="inputVal" value="1" step="any">
        </div>
        <div class="form-group">
          <label class="form-label">输入单位</label>
          <select class="form-input" id="inputUnit"></select>
        </div>
        <button class="swap-btn" id="swapBtn" title="交换单位">⇅</button>
        <div class="form-group">
          <label class="form-label">输出单位</label>
          <select class="form-input" id="outputUnit"></select>
        </div>
      </div>

      <div class="result-big" id="result">—</div>

      <details style="margin-top:16px;">
        <summary style="cursor:pointer;font-weight:600;font-size:0.9rem;">📋 查看所有单位换算结果</summary>
        <div id="allResults" style="margin-top:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;"></div>
      </details>
    </div>

    <div class="ad-unit ad-leaderboard"><span>📢 广告位</span></div>

    <div class="card" style="margin-top:20px;">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:10px;">🧮 更多计算器</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:5px;" id="moreTools"></div>
    </div>
  </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    const units = [
      { key: 'm2', name: '平方米 (m²)', toM2: 1 },
      { key: 'km2', name: '平方千米 (km²)', toM2: 1e6 },
      { key: 'ha', name: '公顷 (ha)', toM2: 10000 },
      { key: 'mu', name: '亩', toM2: 666.6667 },
      { key: 'fen', name: '分', toM2: 66.6667 },
      { key: 'acre', name: '英亩 (acre)', toM2: 4046.856 },
      { key: 'ft2', name: '平方英尺 (ft²)', toM2: 0.092903 },
      { key: 'in2', name: '平方英寸 (in²)', toM2: 0.00064516 },
      { key: 'yd2', name: '平方码 (yd²)', toM2: 0.836127 },
      { key: 'cm2', name: '平方厘米 (cm²)', toM2: 0.0001 },
      { key: 'mm2', name: '平方毫米 (mm²)', toM2: 0.000001 },
      { key: 'qing', name: '顷', toM2: 66666.67 },
    ];

    const inputVal = document.getElementById('inputVal');
    const inputUnit = document.getElementById('inputUnit');
    const outputUnit = document.getElementById('outputUnit');
    const result = document.getElementById('result');
    const allResults = document.getElementById('allResults');

    function populateSelects() {
      const opts = units.map(u => `<option value="${u.key}">${u.name}</option>`).join('');
      inputUnit.innerHTML = opts;
      outputUnit.innerHTML = opts;
      inputUnit.value = 'm2';
      outputUnit.value = 'mu';
    }

    function convert() {
      const val = parseFloat(inputVal.value) || 0;
      const from = units.find(u => u.key === inputUnit.value);
      const to = units.find(u => u.key === outputUnit.value);
      if (!from || !to) return;
      const m2 = val * from.toM2;
      const outVal = m2 / to.toM2;
      result.textContent = `${val} ${from.name.split(' ')[0]} = ${outVal.toPrecision(10)} ${to.name.split(' ')[0]}`;

      let html = '';
      units.forEach(u => {
        const v = m2 / u.toM2;
        html += `<div style="padding:6px 10px;background:#f8fafc;border-radius:6px;font-size:0.82rem;"><strong>${u.name.split(' ')[0]}</strong>: ${v.toPrecision(8)}</div>`;
      });
      allResults.innerHTML = html;
    }

    inputVal.addEventListener('input', convert);
    inputUnit.addEventListener('change', convert);
    outputUnit.addEventListener('change', convert);

    document.getElementById('swapBtn').addEventListener('click', () => {
      const tmp = inputUnit.value;
      inputUnit.value = outputUnit.value;
      outputUnit.value = tmp;
      convert();
    });

    document.getElementById('moreTools').innerHTML = [
      { h: 'length-converter', i: '📏', n: '长度换算' },
      { h: 'weight-converter', i: '⚖️', n: '重量换算' },
      { h: 'temperature-converter', i: '🌡️', n: '温度转换' },
      { h: 'data-convert', i: '💾', n: '数据单位换算' },
      { h: 'zodiac-lookup', i: '🐲', n: '生肖查询' },
      { h: 'rmb-convert', i: '💴', n: '人民币大小写' },
      { h: 'kinship-calculator', i: '👨‍👩‍👧‍👦', n: '家庭称谓计算器' },
      { h: 'grade-converter', i: '🔄', n: '成绩转换器' },
    ].map(t => `<a href="../${t.h}/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>${t.i}</span> ${t.n}</a>`).join('');

    populateSelects();
    convert();
  </script>
</body>
</html>
