<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-src https://googleads.g.doubleclick.net;">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">
  <meta name="description" content="在线时间加减计算器，支持天/时/分/秒的加减运算，以及两个时间点之间的间隔计算。">
  <title>时间加减计算器 - 在线日期时间运算 · 计算器盒子</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .result-card { background: linear-gradient(135deg, #eef2ff, #faf5ff); border-radius: 16px;
      padding: 20px; text-align: center; margin-top: 12px; }
    .result-time { font-size: 2rem; font-weight: 800; color: var(--accent); font-family: var(--font-mono); }
    .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
    .tab-btn { padding: 8px 18px; border: 2px solid var(--border); border-radius: 8px;
      background: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: var(--transition); }
    .tab-btn:hover { border-color: var(--accent); }
    .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    @media (max-width:500px) { .time-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../../index.html">🧰 首页</a> <span class="sep">›</span>
      <a href="../index.html">🧮 计算器盒子</a> <span class="sep">›</span> 时间加减
    </div>

    <div class="card tool-panel">
      <h2 class="panel-title">🕐 时间加减</h2>
      <p class="panel-desc">在线时间加减计算器。支持日期时间的加减运算，以及计算两个时间点之间的时间间隔。</p>

      <div class="tab-bar">
        <button class="tab-btn active" data-tab="add">时间加减</button>
        <button class="tab-btn" data-tab="between">时间间隔</button>
      </div>

      <div id="tabAdd">
        <div class="form-label">起始时间</div>
        <input type="datetime-local" class="form-input" id="startTime">

        <div class="form-label" style="margin-top:8px;">增加/减少</div>
        <div class="time-grid">
          <div><label class="form-label">天</label><input type="number" class="form-input" id="addDay" value="0"></div>
          <div><label class="form-label">时</label><input type="number" class="form-input" id="addHour" value="0"></div>
          <div><label class="form-label">分</label><input type="number" class="form-input" id="addMin" value="0"></div>
          <div><label class="form-label">秒</label><input type="number" class="form-input" id="addSec" value="0"></div>
        </div>
        <button class="btn btn-primary" id="calcAddBtn" style="margin-top:8px;">计算结果</button>
        <div class="result-card" id="addResult" style="display:none;">
          <div style="font-size:0.85rem;color:var(--text-muted);">计算结果</div>
          <div class="result-time" id="addResultTime"></div>
        </div>
      </div>

      <div id="tabBetween" style="display:none;">
        <div class="form-label">时间 A</div>
        <input type="datetime-local" class="form-input" id="timeA">
        <div class="form-label" style="margin-top:8px;">时间 B</div>
        <input type="datetime-local" class="form-input" id="timeB">
        <button class="btn btn-primary" id="calcBetweenBtn" style="margin-top:8px;">计算间隔</button>
        <div class="result-card" id="betweenResult" style="display:none;">
          <div style="font-size:0.85rem;color:var(--text-muted);">时间间隔</div>
          <div class="result-time" id="betweenResultTime"></div>
        </div>
      </div>
    </div>

    <div class="ad-unit ad-leaderboard"><span>📢 广告位</span></div>
    <div class="card" style="margin-top:20px;"><h3 style="font-size:1rem;font-weight:700;margin-bottom:10px;">🧮 更多计算器</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:5px;" id="moreTools"></div></div>
  </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var tab = this.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        document.getElementById('tabAdd').style.display = tab === 'add' ? '' : 'none';
        document.getElementById('tabBetween').style.display = tab === 'between' ? '' : 'none';
      });
    });

    document.getElementById('calcAddBtn').addEventListener('click', function() {
      var st = document.getElementById('startTime').value;
      if (!st) { showToast('请选择起始时间'); return; }
      var d = new Date(st);
      d.setDate(d.getDate() + (parseInt(document.getElementById('addDay').value) || 0));
      d.setHours(d.getHours() + (parseInt(document.getElementById('addHour').value) || 0));
      d.setMinutes(d.getMinutes() + (parseInt(document.getElementById('addMin').value) || 0));
      d.setSeconds(d.getSeconds() + (parseInt(document.getElementById('addSec').value) || 0));
      document.getElementById('addResultTime').textContent = formatDate(d);
      document.getElementById('addResult').style.display = '';
    });

    document.getElementById('calcBetweenBtn').addEventListener('click', function() {
      var a = document.getElementById('timeA').value;
      var b = document.getElementById('timeB').value;
      if (!a || !b) { showToast('请选择两个时间'); return; }
      var d1 = new Date(a), d2 = new Date(b);
      var diffMs = Math.abs(d2 - d1);
      var days = Math.floor(diffMs / 86400000);
      var hours = Math.floor((diffMs % 86400000) / 3600000);
      var mins = Math.floor((diffMs % 3600000) / 60000);
      var secs = Math.floor((diffMs % 60000) / 1000);
      document.getElementById('betweenResultTime').textContent = days + '天 ' + hours + '时 ' + mins + '分 ' + secs + '秒';
      document.getElementById('betweenResult').style.display = '';
    });

    function formatDate(d) {
      return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }
    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    document.getElementById('moreTools').innerHTML = [
      { h: 'gcd-lcm', i: '🔢', n: '公因数/公倍数' },
      { h: 'sequences', i: '📈', n: '数列计算器' },
      { h: 'factorial', i: '!', n: '阶乘计算器' },
      { h: 'fraction-calc', i: '÷', n: '分数计算器' },
      { h: 'text-set', i: '∩∪', n: '文本交集/差集' },
      { h: 'permutations', i: '🔀', n: '列表全排列' },
      { h: 'zodiac-lookup', i: '🐲', n: '生肖查询' },
      { h: 'kinship-calculator', i: '👨‍👩‍👧‍👦', n: '家庭称谓' },
    ].map(function(t) { return '<a href="../' + t.h + '/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>' + t.i + '</span> ' + t.n + '</a>'; }).join('');
  </script>
</body>
</html>
