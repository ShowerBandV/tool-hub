<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="期末总评计算器，支持加权总分计算与反推期末所需分数，帮助学生规划复习目标。">
  <title>期末总评计算器 · 计算机盒子</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../../index.html">🧰 首页</a> <span class="sep">›</span>
      <a href="../index.html">🧮 计算机盒子</a> <span class="sep">›</span> 期末总评计算器
    </div>

    <div class="card tool-panel">
      <h2 class="panel-title">📊 期末总评计算器</h2>
      <p class="panel-desc">期末总评计算器。添加各评分项（作业、测验、期中、期末等）的名称、得分和权重百分比，自动计算加权总分。还可反向推算：输入目标总评，算出期末需要考多少分才能达成目标。</p>
      <div class="input-row">
        <div class="form-group"><label class="form-label">平时分 (满分100)</label><input type="number" class="form-input" id="fg-hw-score" placeholder="例: 92" min="0" max="100" step="0.1"></div>
        <div class="form-group" style="max-width:100px;"><label class="form-label">占比 %</label><input type="number" class="form-input" id="fg-hw-weight" placeholder="20" min="0" max="100" step="0.1"></div>
      </div>
      <div class="input-row">
        <div class="form-group"><label class="form-label">期中分 (满分100)</label><input type="number" class="form-input" id="fg-mid-score" placeholder="例: 85" min="0" max="100" step="0.1"></div>
        <div class="form-group" style="max-width:100px;"><label class="form-label">占比 %</label><input type="number" class="form-input" id="fg-mid-weight" placeholder="30" min="0" max="100" step="0.1"></div>
      </div>
      <div class="input-row">
        <div class="form-group"><label class="form-label">期末分 (留空=反推)</label><input type="number" class="form-input" id="fg-final-score" placeholder="例: 88" min="0" max="100" step="0.1"></div>
        <div class="form-group" style="max-width:100px;"><label class="form-label">占比 %</label><input type="number" class="form-input" id="fg-final-weight" placeholder="50" min="0" max="100" step="0.1"></div>
      </div>
      <div class="form-group" id="fg-target-group" style="display:none;">
        <label class="form-label">🎯 目标总分 (满分100)</label>
        <input type="number" class="form-input" id="fg-target-score" placeholder="例: 90" min="0" max="100" step="0.1">
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="calcFinalGrade()">📊 计算总分</button>
        <button class="btn btn-outline btn-sm" onclick="toggleTargetMode()" id="fg-toggle-btn">🎯 反推期末分数</button>
      </div>
      <div class="result-box result-primary" id="fg-result"></div>
    </div>

    <div class="ad-unit ad-leaderboard">
      <span>📢 广告位</span>
    </div>

    <div class="card" style="margin-top:20px;">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:10px;">🧮 更多计算机工具</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:5px;">
        <a href="../grade-converter/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🔄</span> 成绩转换器</a>
        <a href="../final-grade/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📊</span> 期末总评计算器</a>
        <a href="../gpa-cgpa/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🎓</span> GPA & CGPA 计算器</a>
        <a href="../ap-score/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📝</span> AP 分数计算器</a>
        <a href="../data-convert/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📐</span> 数据单位换算</a>
        <a href="../scientific-calc/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🔢</span> 科学计算器</a>
        <a href="../graph-calc/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📈</span> 图形计算器</a>
      </div>
    </div>
  </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    let fgTargetMode = false;
    function toggleTargetMode() {
      fgTargetMode = !fgTargetMode;
      const tg = document.getElementById('fg-target-group');
      const btn = document.getElementById('fg-toggle-btn');
      const fi = document.getElementById('fg-final-score');
      if (fgTargetMode) {
        tg.style.display = 'block'; btn.textContent = '📊 切换为直接计算';
        fi.placeholder = '自动计算'; fi.value = ''; fi.disabled = true;
        tg.animate([{opacity:0,transform:'translateY(-6px)'},{opacity:1,transform:'translateY(0)'}],{duration:300,easing:'ease-out'});
      } else {
        tg.style.display = 'none'; btn.textContent = '🎯 反推期末分数';
        fi.placeholder = '例: 88'; fi.disabled = false;
      }
    }
    function calcFinalGrade() {
      const hw = parseFloat(document.getElementById('fg-hw-score').value);
      const hwW = parseFloat(document.getElementById('fg-hw-weight').value);
      const mid = parseFloat(document.getElementById('fg-mid-score').value);
      const midW = parseFloat(document.getElementById('fg-mid-weight').value);
      const finW = parseFloat(document.getElementById('fg-final-weight').value);
      const res = document.getElementById('fg-result');
      if (isNaN(hwW) || isNaN(midW) || isNaN(finW)) {
        res.className = 'result-box result-danger show';
        res.innerHTML = '⚠️ 请填写所有占比。'; return;
      }
      if (Math.abs(hwW + midW + finW - 100) > 0.5) {
        res.className = 'result-box result-warning show';
        res.innerHTML = `⚠️ 占比之和为${preciseRound(hwW+midW+finW,1)}%，建议调整为100%。`; return;
      }
      if (fgTargetMode) {
        const target = parseFloat(document.getElementById('fg-target-score').value);
        if (isNaN(hw) || isNaN(mid) || isNaN(target)) {
          res.className = 'result-box result-danger show';
          res.innerHTML = '⚠️ 请填写平时分、期中分和目标总分。'; return;
        }
        if (finW === 0) { res.className = 'result-box result-danger show'; res.innerHTML = '⚠️ 期末占比不能为0。'; return; }
        const known = (hw * hwW + mid * midW) / 100;
        const need = ((target - known) * 100) / finW;
        res.className = need > 100 ? 'result-box result-danger show' : need < 0 ? 'result-box result-success show' : 'result-box result-primary show';
        res.innerHTML = need > 100
          ? `😰 需要期末考 <b>${preciseRound(need,1)}</b> 分才能达到 <b>${target}</b> 分。<br><small>超过100分，目标难以实现。</small>`
          : need < 0 ? `🎉 即使期末考0分也能达到目标 <b>${target}</b> 分！`
          : `🎯 要达到 <b>${target}</b> 分，期末需要考 <span class="result-big">${preciseRound(need,1)}</span> 分`;
      } else {
        const fin = parseFloat(document.getElementById('fg-final-score').value);
        if (isNaN(hw) || isNaN(mid) || isNaN(fin)) {
          res.className = 'result-box result-danger show';
          res.innerHTML = '⚠️ 请填写所有分数。'; return;
        }
        const total = (hw * hwW + mid * midW + fin * finW) / 100;
        res.className = 'result-box result-primary show';
        res.innerHTML = `📊 最终总评：<span class="result-big">${preciseRound(total,2)}</span> 分`;
      }
      res.animate([{opacity:0,transform:'scale(0.85)'},{opacity:1,transform:'scale(1)'}],{duration:450,easing:'cubic-bezier(0.175,0.885,0.32,1.275)'});
    }
  </script>
</body>
</html>
