<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="AP分数计算器，涵盖8门常见AP科目，选择题与自由回答题综合估分。">
  <title>AP 分数计算器 · 计算机盒子</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../../index.html">🧰 首页</a> <span class="sep">›</span>
      <a href="../index.html">🧮 计算机盒子</a> <span class="sep">›</span> AP 分数计算器
    </div>

    <div class="card tool-panel">
      <h2 class="panel-title">📝 AP考试分数计算器</h2>
      <p class="panel-desc">AP分数计算器。选择AP科目（微积分、物理、化学等8门），分别输入选择题得分（0-60）和自由回答得分（0-40），自动换算为1-5分的AP最终成绩，帮助学生考前估分。</p>
      <div class="form-group">
        <label class="form-label">选择AP科目</label>
        <select class="form-select" id="ap-subject" onchange="updateAPInfo()">
          <option value="calc-ab">AP Calculus AB</option><option value="calc-bc">AP Calculus BC</option>
          <option value="bio">AP Biology</option><option value="chem">AP Chemistry</option>
          <option value="phys1">AP Physics 1</option><option value="cs-a">AP Computer Science A</option>
          <option value="stats">AP Statistics</option><option value="psych">AP Psychology</option>
        </select>
      </div>
      <div class="result-box result-primary show" id="ap-info-card" style="font-weight:400;font-size:0.85rem;text-align:left;"></div>
      <div class="input-row">
        <div class="form-group"><label class="form-label" id="ap-mc-label">选择题正确数</label><input type="number" class="form-input" id="ap-mc-score" placeholder="正确题数" min="0" step="1"></div>
        <div class="form-group"><label class="form-label" id="ap-frq-label">自由回答题原始得分</label><input type="number" class="form-input" id="ap-frq-score" placeholder="原始得分" min="0" step="0.1"></div>
      </div>
      <button class="btn btn-primary" onclick="calcAPScore()">📝 估算AP分数</button>
      <div class="result-box result-warning" id="ap-result"></div>
      <div style="font-size:0.68rem;color:var(--text-secondary);margin-top:6px;">⚠️ 转换表为近似数据，实际每年分数线可能调整，仅供参考。</div>
    </div>

    <div class="ad-unit ad-leaderboard">
      <span>📢 广告位</span>
    </div>

    <div class="card" style="margin-top:20px;">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:10px;">🧮 更多计算机工具</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:5px;">
        <a href="../grade-converter/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🔄</span> 成绩转换器</a>
        <a href="../final-grade/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📊</span> 期末总评计算器</a>
        <a href="../gpa-cgpa/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🎓</span> GPA & CGPA 计算器</a>
        <a href="../ap-score/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📝</span> AP 分数计算器</a>
        <a href="../data-convert/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📐</span> 数据单位换算</a>
        <a href="../scientific-calc/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🔢</span> 科学计算器</a>
        <a href="../graph-calc/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📈</span> 图形计算器</a>
      </div>
    </div>
  </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    const apSubjects = {
      'calc-ab': { name:'AP Calculus AB', mcTotal:45, frqTotal:54, mcWeight:0.5, frqWeight:0.5, cutoffs:[68,52,39,27,0] },
      'calc-bc': { name:'AP Calculus BC', mcTotal:45, frqTotal:54, mcWeight:0.5, frqWeight:0.5, cutoffs:[70,55,40,28,0] },
      'bio':     { name:'AP Biology', mcTotal:60, frqTotal:40, mcWeight:0.5, frqWeight:0.5, cutoffs:[78,62,46,30,0] },
      'chem':    { name:'AP Chemistry', mcTotal:60, frqTotal:46, mcWeight:0.5, frqWeight:0.5, cutoffs:[80,63,47,31,0] },
      'phys1':   { name:'AP Physics 1', mcTotal:50, frqTotal:45, mcWeight:0.5, frqWeight:0.5, cutoffs:[72,55,40,26,0] },
      'cs-a':    { name:'AP Computer Science A', mcTotal:40, frqTotal:36, mcWeight:0.5, frqWeight:0.5, cutoffs:[62,47,34,22,0] },
      'stats':   { name:'AP Statistics', mcTotal:40, frqTotal:40, mcWeight:0.5, frqWeight:0.5, cutoffs:[65,50,36,23,0] },
      'psych':   { name:'AP Psychology', mcTotal:100, frqTotal:50, mcWeight:0.67, frqWeight:0.33, cutoffs:[75,60,44,28,0] }
    };
    function updateAPInfo() {
      const k = document.getElementById('ap-subject').value;
      const s = apSubjects[k];
      document.getElementById('ap-info-card').innerHTML = `<b>${s.name}</b> | 选择题${s.mcTotal}题(占${Math.round(s.mcWeight*100)}%) + 自由回答${s.frqTotal}分(占${Math.round(s.frqWeight*100)}%)`;
      document.getElementById('ap-info-card').className = 'result-box result-primary show';
      document.getElementById('ap-mc-label').textContent = `选择题正确数 (共${s.mcTotal}题)`;
      document.getElementById('ap-frq-label').textContent = `自由回答题原始得分 (满分${s.frqTotal}分)`;
    }
    function calcAPScore() {
      const k = document.getElementById('ap-subject').value;
      const s = apSubjects[k];
      const mc = parseInt(document.getElementById('ap-mc-score').value);
      const frq = parseFloat(document.getElementById('ap-frq-score').value);
      const res = document.getElementById('ap-result');
      if (isNaN(mc) || isNaN(frq) || mc < 0 || mc > s.mcTotal || frq < 0 || frq > s.frqTotal) {
        res.className = 'result-box result-danger show';
        res.innerHTML = '⚠️ 请填写有效的分数。'; return;
      }
      const comp = (mc/s.mcTotal*100)*s.mcWeight + (frq/s.frqTotal*100)*s.frqWeight;
      let score = 1;
      if (comp >= s.cutoffs[0]) score = 5;
      else if (comp >= s.cutoffs[1]) score = 4;
      else if (comp >= s.cutoffs[2]) score = 3;
      else if (comp >= s.cutoffs[3]) score = 2;
      const emoji = {5:'🌟',4:'👍',3:'✅',2:'📚',1:'💪'};
      res.className = `result-box ${score>=4?'result-success':score<=2?'result-danger':'result-warning'} show`;
      res.innerHTML = `${emoji[score]} 预估AP分数：<span class="result-big">${score}</span> 分<br><small>综合得分率: ${preciseRound(comp,1)}%</small>`;
      res.animate([{opacity:0,transform:'scale(0.7)'},{opacity:1,transform:'scale(1)'}],{duration:500,easing:'cubic-bezier(0.175,0.885,0.32,1.275)'});
    }
    updateAPInfo();
  </script>
</body>
</html>
