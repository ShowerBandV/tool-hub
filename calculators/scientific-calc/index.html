  <style>
    .casio-calc {
      max-width: 400px; margin: 0 auto;
      background: #3d4248; border-radius: 14px;
      padding: 14px; box-shadow: 0 10px 32px rgba(0,0,0,0.35);
    }
    .casio-screen {
      background: #c8d8c8; border-radius: 6px;
      padding: 14px 16px; margin-bottom: 12px; min-height: 60px;
      font-family: var(--font-mono); font-size: 1.3rem;
      text-align: right; border: inset 3px solid #a0b8a0; color: #1a2a1a;
      word-break: break-all;
    }
    .casio-screen .expression { font-size: 0.85rem; color: #555; min-height: 20px; }
    .casio-screen .result-display { font-size: 1.4rem; font-weight: 700; }
    .casio-buttons {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px;
    }
    .casio-btn {
      padding: 10px 3px; font-size: 0.78rem; font-weight: 600;
      border: none; border-radius: 5px; cursor: pointer;
      background: #e8e8e8; color: #222; font-family: var(--font-mono);
      box-shadow: 0 2px 0 #b8b8b8; min-height: 36px;
    }
    .casio-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #b8b8b8; }
    .casio-btn.func { background: #5a6c7d; color: #fff; }
    .casio-btn.equal { background: #f0a040; color: #fff; font-weight: 700; }
    .casio-btn.clear { background: #d94a4a; color: #fff; }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../../index.html">🧰 首页</a> <span class="sep">›</span>
      <a href="../index.html">🧮 计算机盒子</a> <span class="sep">›</span> 科学计算器
    </div>

    <div class="card tool-panel">
      <h2 class="panel-title">🔢 卡西欧科学计算器</h2>
      <p class="panel-desc">在线科学计算器。卡西欧风格仿真界面，支持基本四则运算、三角函数（sin/cos/tan）、对数（log/ln）、指数幂运算、阶乘、π等科学计算功能。支持键盘输入，适合学生和工程计算。</p>
      <div class="casio-calc">
        <div class="casio-screen">
          <div class="expression" id="casio-expr"></div>
          <div class="result-display" id="casio-display">0</div>
        </div>
        <div class="casio-buttons">
          <button class="casio-btn clear" onclick="casioClear()">AC</button>
          <button class="casio-btn func" onclick="casioInput('(')">(</button>
          <button class="casio-btn func" onclick="casioInput(')')">)</button>
          <button class="casio-btn func" onclick="casioInput('^')">xʸ</button>
          <button class="casio-btn func" onclick="casioInput('/')">÷</button>
          <button class="casio-btn func" onclick="casioInput('sin(')">sin</button>
          <button class="casio-btn" onclick="casioInput('7')">7</button>
          <button class="casio-btn" onclick="casioInput('8')">8</button>
          <button class="casio-btn" onclick="casioInput('9')">9</button>
          <button class="casio-btn func" onclick="casioInput('*')">×</button>
          <button class="casio-btn func" onclick="casioInput('cos(')">cos</button>
          <button class="casio-btn" onclick="casioInput('4')">4</button>
          <button class="casio-btn" onclick="casioInput('5')">5</button>
          <button class="casio-btn" onclick="casioInput('6')">6</button>
          <button class="casio-btn func" onclick="casioInput('-')">−</button>
          <button class="casio-btn func" onclick="casioInput('tan(')">tan</button>
          <button class="casio-btn" onclick="casioInput('1')">1</button>
          <button class="casio-btn" onclick="casioInput('2')">2</button>
          <button class="casio-btn" onclick="casioInput('3')">3</button>
          <button class="casio-btn func" onclick="casioInput('+')">+</button>
          <button class="casio-btn func" onclick="casioInput('log(')">log</button>
          <button class="casio-btn" onclick="casioInput('0')">0</button>
          <button class="casio-btn" onclick="casioInput('.')">.</button>
          <button class="casio-btn func" onclick="casioInput('sqrt(')">√</button>
          <button class="casio-btn equal" onclick="casioEvaluate()">=</button>
          <button class="casio-btn func" onclick="casioInput('ln(')">ln</button>
          <button class="casio-btn func" onclick="casioInput('pi')">π</button>
          <button class="casio-btn func" onclick="casioInput('e')">e</button>
          <button class="casio-btn func" onclick="casioBackspace()">⌫</button>
          <button class="casio-btn equal" onclick="casioEvaluate()">ENTER</button>
        </div>
      </div>
    </div>

    <div class="ad-unit ad-leaderboard">
      <span>📢 广告位</span>
    </div>

    <div class="card" style="margin-top:20px;">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:10px;">🧮 更多计算机工具</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:5px;">
        <a href="../grade-converter/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🔄</span> 成绩转换器</a>
        <a href="../final-grade/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📊</span> 期末总评计算器</a>
        <a href="../gpa-cgpa/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🎓</span> GPA & CGPA 计算器</a>
        <a href="../ap-score/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📝</span> AP 分数计算器</a>
        <a href="../data-convert/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📐</span> 数据单位换算</a>
        <a href="../scientific-calc/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🔢</span> 科学计算器</a>
        <a href="../graph-calc/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>📈</span> 图形计算器</a>
      </div>
    </div>
  </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    let casioExpr = '';
    function casioInput(v) { casioExpr += v; updateCasioDisplay(); }
    function casioClear() { casioExpr = ''; document.getElementById('casio-display').textContent = '0'; document.getElementById('casio-expr').textContent = ''; }
    function casioBackspace() {
      const fns = ['sin(','cos(','tan(','log(','ln(','sqrt(','exp('];
      let removed = false;
      for (const f of fns) { if (casioExpr.endsWith(f)) { casioExpr = casioExpr.slice(0, -f.length); removed = true; break; } }
      if (!removed) casioExpr = casioExpr.slice(0, -1);
      updateCasioDisplay();
      if (!casioExpr) document.getElementById('casio-display').textContent = '0';
    }
    function updateCasioDisplay() {
      document.getElementById('casio-expr').textContent = casioExpr.replace(/\*/g,'×').replace(/\//g,'÷').replace(/pi/g,'π').replace(/sqrt/g,'√');
    }
    function casioEvaluate() {
      if (!casioExpr) return;
      try {
        let e = casioExpr.replace(/(\d)(pi|e)/g,'$1*$2').replace(/(pi|e)(\d)/g,'$1*$2').replace(/\)\(/g,')*(').replace(/(\d)\(/g,'$1*(').replace(/\)(\d)/g,')*$1').replace(/sin/g,'Math.sin').replace(/cos/g,'Math.cos').replace(/tan/g,'Math.tan').replace(/log/g,'Math.log10').replace(/ln/g,'Math.log').replace(/sqrt/g,'Math.sqrt').replace(/pi/g,'Math.PI').replace(/e/g,'Math.E').replace(/\^/g,'**');
        const r = Function('"use strict"; return (' + e + ')')();
        let disp = isFinite(r) ? String(parseFloat(r.toPrecision(12))) : 'Error';
        if (Math.abs(parseFloat(disp)) < 1e-10) disp = '0';
        document.getElementById('casio-display').textContent = disp;
        casioExpr = disp;
        document.getElementById('casio-expr').textContent = '';
      } catch(e) { document.getElementById('casio-display').textContent = 'Error'; }
    }
    document.addEventListener('keydown', function(e) {
      const k = e.key;
      if (/[0-9]/.test(k)) casioInput(k);
      else if (k === '+') casioInput('+');
      else if (k === '-') casioInput('-');
      else if (k === '*') casioInput('*');
      else if (k === '/') { e.preventDefault(); casioInput('/'); }
      else if (k === '^') casioInput('^');
      else if (k === '(') casioInput('(');
      else if (k === ')') casioInput(')');
      else if (k === '.') casioInput('.');
      else if (k === 'Enter' || k === '=') { e.preventDefault(); casioEvaluate(); }
      else if (k === 'Backspace') { e.preventDefault(); casioBackspace(); }
      else if (k === 'Escape') { e.preventDefault(); casioClear(); }
      else if (k === 'p') casioInput('pi');
      else if (k === 'e') casioInput('e');
    });
  </script>
</body>
</html>
