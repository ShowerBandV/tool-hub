        'husband,elder_brother,daughter': { title: '侄女', sub: '丈夫哥哥的女儿', playful: null },
        'husband,younger_brother,son': { title: '侄子', sub: '丈夫弟弟的儿子', playful: null },
        'husband,younger_brother,daughter': { title: '侄女', sub: '丈夫弟弟的女儿', playful: null },
        'husband,elder_sister,son': { title: '外甥', sub: '丈夫姐姐的儿子', playful: null },
        'husband,elder_sister,daughter': { title: '外甥女', sub: '丈夫姐姐的女儿', playful: null },
        'husband,younger_sister,son': { title: '外甥', sub: '丈夫妹妹的儿子', playful: null },
        'husband,younger_sister,daughter': { title: '外甥女', sub: '丈夫妹妹的女儿', playful: null },

        // My spouse's sibling's spouse
        'wife,elder_brother,wife': { title: '舅嫂', sub: '妻子哥哥的妻子', playful: null },
        'wife,younger_brother,wife': { title: '舅弟媳', sub: '妻子弟弟的妻子', playful: null },
        'wife,elder_sister,husband': { title: '连襟', sub: '妻子姐姐的丈夫', playful: null },
        'wife,younger_sister,husband': { title: '连襟', sub: '妻子妹妹的丈夫', playful: null },
        'husband,elder_brother,wife': { title: '妯娌', sub: '丈夫哥哥的妻子', playful: null },
        'husband,younger_brother,wife': { title: '妯娌', sub: '丈夫弟弟的妻子', playful: null },
        'husband,elder_sister,husband': { title: '姐/妹夫', sub: '丈夫姐妹的丈夫', playful: null },

        // 4-hop: cousin's child (merged keys)
        'father,brother,son,son': { title: '堂侄', sub: '堂哥/弟的儿子', playful: null },
        'father,brother,son,daughter': { title: '堂侄女', sub: '堂哥/弟的女儿', playful: null },
        'father,brother,daughter,son': { title: '堂侄', sub: '堂姐/妹的儿子', playful: null },
        'father,brother,daughter,daughter': { title: '堂侄女', sub: '堂姐/妹的女儿', playful: null },
        'father,sister,son,son': { title: '表侄', sub: '姑表哥/弟的儿子', playful: null },
        'father,sister,daughter,son': { title: '表侄', sub: '姑表姐/妹的儿子', playful: null },
        'mother,brother,son,son': { title: '表侄', sub: '舅表哥/弟的儿子', playful: null },
        'mother,brother,daughter,son': { title: '表侄', sub: '舅表姐/妹的儿子', playful: null },
        'mother,sister,son,son': { title: '表侄', sub: '姨表哥/弟的儿子', playful: null },
        'mother,sister,daughter,son': { title: '表侄', sub: '姨表姐/妹的儿子', playful: null },

        // Original 4-hop specific keys
        'father,elder_brother,son,son': { title: '堂侄', sub: '堂哥/弟的儿子', playful: null },
        'father,younger_brother,son,son': { title: '堂侄', sub: '堂哥/弟的儿子', playful: null },
        'mother,elder_brother,son,son': { title: '表侄', sub: '表哥/弟的儿子', playful: null },
        'mother,younger_brother,son,son': { title: '表侄', sub: '表哥/弟的儿子', playful: null },

        // My parent's cousin = my "表叔/表姑" (parent's cousin)
        'father,father,brother,son': { title: '堂叔/伯', sub: '爷爷兄弟的儿子（父亲的堂兄弟）', playful: null },
        'father,father,sister,son': { title: '表叔/伯', sub: '爷爷姐妹的儿子（父亲的表兄弟）', playful: null },
        'father,mother,brother,son': { title: '表叔/伯', sub: '奶奶兄弟的儿子（父亲的表兄弟）', playful: null },
        'father,mother,sister,son': { title: '表叔/伯', sub: '奶奶姐妹的儿子（父亲的表兄弟）', playful: null },

        // Reverse: from parent perspective
        'son,son,son': { title: '曾孙', sub: '孙子的儿子', playful: null },
        'son,son,daughter': { title: '曾孙女', sub: '孙子的女儿', playful: null },
        'son,daughter,son': { title: '曾外孙', sub: '孙女/外孙女的儿子', playful: null },
        'daughter,son,son': { title: '曾外孙', sub: '外孙的儿子', playful: null },
        'daughter,daughter,son': { title: '曾外孙', sub: '外孙女的儿子', playful: null },

        // Mixed 3-hop: my parent + my spouse (parent-in-law chain)
        'husband,father,father': { title: '太公公', sub: '公公的父亲', playful: null },
        'husband,father,mother': { title: '太婆婆', sub: '公公的母亲', playful: null },
        'husband,mother,father': { title: '太公公', sub: '婆婆的父亲', playful: null },
        'husband,mother,mother': { title: '太婆婆', sub: '婆婆的母亲', playful: null },
        'wife,father,father': { title: '太岳父', sub: '岳父的父亲', playful: null },
        'wife,father,mother': { title: '太岳母', sub: '岳父的母亲', playful: null },
        'wife,mother,father': { title: '太岳父', sub: '岳母的父亲', playful: null },
        'wife,mother,mother': { title: '太岳母', sub: '岳母的母亲', playful: null },
      };

      if (lookup[key]) return lookup[key];

      // Try gender-merged keys for siblings (elder/younger → any)
      var mergedKey = relPath.map(function(r) {
        if (r === 'elder_brother' || r === 'younger_brother') return 'brother';
        if (r === 'elder_sister' || r === 'younger_sister') return 'sister';
        return r;
      }).join(',');
      if (mergedKey !== key && lookup[mergedKey]) return lookup[mergedKey];

      // Try swapping elder/younger variants
      var swappedKey = relPath.map(function(r) {
        if (r === 'elder_brother') return 'younger_brother';
        if (r === 'younger_brother') return 'elder_brother';
        if (r === 'elder_sister') return 'younger_sister';
        if (r === 'younger_sister') return 'elder_sister';
        return r;
      }).join(',');
      if (swappedKey !== key && lookup[swappedKey]) return lookup[swappedKey];

      // For unsupported paths, try to give a reasonable guess
      const playfulMessages = [
        '🤔 这个关系绕得有点远，微信家族群里都没人这么称呼～',
        '🫠 好复杂的亲戚关系！建议直接叫"叔叔/阿姨"保平安…',
        '😅 这关系链条太长了，过年走亲戚怕是走不到这一步…',
        '🙈 计算器宕机了！这么远的关系，见面喊声"你好"就行…',
        '👀 这要是在古代，你得行大礼才够得着这个关系～',
        '🎭 亲戚关系计算器已经烧脑了，建议开启"微笑模式"蒙混过关！',
        '🧬 DNA相似度可能已经低于1%了，就当是"远房亲戚"吧～',
        '📏 关系链条长度已超过家谱厚度，建议先画个树状图…',
      ];

      const msg = playfulMessages[Math.floor(Math.random() * playfulMessages.length)];
      return {
        title: '🤷 算不出来啦',
        sub: '关系链条太长或太复杂，暂时无法计算。试试更短的关系链吧！',
        playful: msg
      };
    }

    function renderPath() {
      if (path.length === 0) {
        pathDisplay.innerHTML = '<span style="color:var(--text-muted);">点击下方按钮构建关系链…</span>';
      } else {
        const parts = ['<span class="path-node">👤 我</span>'];
        path.forEach(r => {
          parts.push('<span class="path-arrow">›</span>');
          parts.push(`<span class="path-node">${relLabels[r]}</span>`);
        });
        if (direction === 'them_to_me') {
          parts.push('<span style="font-size:0.78rem;color:var(--text-muted);margin-left:4px;">（TA这样叫我）</span>');
        } else {
          parts.push('<span style="font-size:0.78rem;color:var(--text-muted);margin-left:4px;">（我这样叫TA）</span>');
        }
        pathDisplay.innerHTML = parts.join('');
      }
    }

    function calculate() {
      const result = getKinshipResult(path);
      resultCard.querySelector('.result-title').textContent = result.title;
      resultCard.querySelector('.result-sub').textContent = result.sub;

      if (result.playful) {
        playfulMsg.style.display = 'block';
        playfulMsg.textContent = result.playful;
      } else {
        playfulMsg.style.display = 'none';
      }
    }

    function update() {
      renderPath();
      calculate();
    }

    // Button clicks
    document.querySelectorAll('.rel-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const rel = btn.dataset.rel;
        path.push(rel);
        // Limit path length to prevent too much complexity
        if (path.length > 6) {
          path.pop();
          showToast('😅 关系链条太长啦，最多6步哦～');
          return;
        }
        update();
      });
    });

    document.getElementById('undoBtn').addEventListener('click', () => {
      path.pop();
      update();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      path = [];
      direction = 'me_to_them';
      document.getElementById('flipBtn').textContent = '🔄 切换方向（我→TA / TA→我）';
      update();
    });

    document.getElementById('flipBtn').addEventListener('click', () => {
      direction = direction === 'me_to_them' ? 'them_to_me' : 'me_to_them';
      document.getElementById('flipBtn').textContent = direction === 'me_to_them'
        ? '🔄 切换方向（我→TA / TA→我）'
        : '🔄 切换方向（TA→我 / 我→TA）';
      update();
    });

    document.getElementById('moreTools').innerHTML = [
      { h: 'length-converter', i: '📏', n: '长度换算' },
      { h: 'weight-converter', i: '⚖️', n: '重量换算' },
      { h: 'temperature-converter', i: '🌡️', n: '温度转换' },
      { h: 'area-converter', i: '📐', n: '面积换算' },
      { h: 'zodiac-lookup', i: '🐲', n: '生肖查询' },
      { h: 'rmb-convert', i: '💴', n: '人民币大小写' },
      { h: 'pinyin-table', i: '🔤', n: '拼音字母表' },
      { h: 'grade-converter', i: '🔄', n: '成绩转换器' },
    ].map(t => `<a href="../${t.h}/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>${t.i}</span> ${t.n}</a>`).join('');

    update();
  </script>
