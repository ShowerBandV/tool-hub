<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-src https://googleads.g.doubleclick.net;">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <meta name="description" content="涂鸦跳跃 Doodle Jump 网页版 — 免费在线经典跳跃小游戏。控制角色在随机平台间不断向上跳跃，四种角色可选，支持键盘方向键和手机触屏操控，躲避怪物和缺口，分数挑战排行榜，即开即玩。">
  <title>涂鸦跳跃 Doodle Jump - 免费在线跳跃小游戏 · 游戏盒子</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <script src="../../assets/lib/anime.min.js"></script>
  <style>
    :root { --bg: #f5f5f0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #e8e5dd;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      touch-action: manipulation;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    /* 面包屑覆盖层 */
    .breadcrumb-overlay {
      position: fixed;
      top: 8px;
      left: 12px;
      z-index: 100;
      display: flex; gap: 4px; align-items: center;
      font-size: 0.72rem; font-weight: 600;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.1);
      color: #5b6270;
    }
    .breadcrumb-overlay a {
      color: #4f46e5; text-decoration: none;
    }
    .breadcrumb-overlay a:hover { text-decoration: underline; }
    .breadcrumb-overlay .sep { color: #94a3b8; }
    /* 更多游戏浮层 */
    .more-games-overlay {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; gap: 6px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      padding: 6px 12px;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.1);
    }
    .more-games-overlay a {
      font-size: 0.72rem; font-weight: 600;
      padding: 3px 8px; border-radius: 6px;
      color: #4f46e5; text-decoration: none;
      background: #f8fafc; border: 1px solid #e2e8f0;
      white-space: nowrap;
    }
    .more-games-overlay a:hover { background: #eef2ff; }
    .game-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 420px;
      padding: 0 10px;
      color: #2c2c2c;
      font-weight: 700;
      letter-spacing: 0.5px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .stats {
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(255,255,255,0.7);
      padding: 6px 15px;
      border-radius: 30px;
      border: 2px solid #333;
      backdrop-filter: blur(8px);
      font-size: 0.9rem;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .best-score {
      font-size: 0.8rem;
      color: #2c2c2c;
      background: rgba(255,255,255,0.7);
      padding: 5px 12px;
      border-radius: 16px;
      border: 2px solid #333;
    }
    .best-score span { font-weight: 700; }
    .buff-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(240,240,240,0.9);
      border: 2px solid #111;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #111;
      font-weight: bold;
    }
    /* Loading spinner */
    .loading-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #fffef7; border-radius: 18px; z-index: 10; gap: 16px;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 48px; height: 48px; border: 5px solid #e2e8f0;
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-weight: 700; color: #64748b; font-size: 0.9rem; }
    canvas {
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 0 3px #333;
      max-width: 95vw;
      max-height: 85vh;
      display: block;
      touch-action: none;
      background: #fffef7;
    }
    .controls-hint {
      color: #444;
      font-size: 0.75rem;
      text-align: center;
      font-weight: 500;
    }
    .controls-hint kbd {
      background: #fff;
      padding: 2px 7px;
      border-radius: 4px;
      margin: 0 2px;
      font-size: 0.7rem;
      border: 2px solid #333;
    }
  </style>
</head>
<body>
  <div class="breadcrumb-overlay">
    <a href="../../index.html">🧰 首页</a> <span class="sep">›</span>
    <a href="../index.html">🎮 游戏盒子</a> <span class="sep">›</span> 涂鸦跳跃
  </div>

  <div class="more-games-overlay">
    <a href="../doodle-jump/index.html">🦘 涂鸦跳跃</a>
  </div>

  <div class="game-wrapper">
    <div class="game-header">
      <div class="stats">
        <div class="stat-item">🏆 <span id="scoreDisplay">0</span></div>
      </div>
      <div class="best-score">👑 最高: <span id="bestScoreDisplay">0</span></div>
      <div id="buffBar" class="buff-indicator" style="display: none;">⚡ 加速中 <span id="buffTimer">0</span>s</div>
    </div>
    <div style="position:relative;display:inline-block;">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">加载中...</div>
      </div>
      <canvas id="gameCanvas"></canvas>
    </div>
    <div class="controls-hint">
      <kbd>←</kbd><kbd>→</kbd> 或 <kbd>A</kbd><kbd>D</kbd> 移动 · 移动端触摸左右半屏
    </div>

    <div class="card" style="margin-top:12px;width:100%;max-width:420px;">
      <h3 class="panel-title" style="font-size:1rem;">📖 涂鸦跳跃游戏说明</h3>
      <p style="color:var(--text-secondary);line-height:1.7;font-size:0.85rem;">涂鸦跳跃（Doodle Jump）是一款经典平台跳跃游戏，由 Lima Sky 工作室于 2009 年发布。控制可爱的涂鸦角色在随机生成的平台间不断向上跳跃，平台类型包括固定平台、移动平台、碎裂平台和弹簧平台。四种角色可选，支持键盘方向键和手机触屏操控。目标是在不坠落的前提下跳得更高，获得更高分数。</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:0.8rem;color:var(--text-secondary);">
        <span><strong>← →</strong> 或 <strong>A D</strong> 移动</span>
        <span><strong>触屏</strong> 点击左右半屏</span>
        <span>踩弹簧获额外弹跳</span>
      </div>
    </div>
  </div>

  <div class="ad-unit ad-footer" style="position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:99;"><span>📢 广告位</span></div>

  <script src="../../assets/js/common.js" defer></script>
  <script src="src/config.js" defer></script>
  <script src="src/state.js" defer></script>
  <script src="src/platform.js" defer></script>
  <script src="src/render.js" defer></script>
  <script src="src/input.js" defer></script>
  <script src="src/main.js" defer></script>
</body>
</html>
