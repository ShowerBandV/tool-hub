<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>涂鸦跳跃 · 游戏盒子</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <style>
    :root { --bg: #f5f5f0; }
    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 420px;
      padding: 0 10px;
      color: #2c2c2c;
      font-weight: 700;
      letter-spacing: 0.5px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .stats {
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(255,255,255,0.7);
      padding: 6px 15px;
      border-radius: 30px;
      border: 2px solid #333;
      backdrop-filter: blur(8px);
      font-size: 0.9rem;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .best-score {
      font-size: 0.8rem;
      color: #2c2c2c;
      background: rgba(255,255,255,0.7);
      padding: 5px 12px;
      border-radius: 16px;
      border: 2px solid #333;
    }
    .best-score span { font-weight: 700; }
    .buff-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(240,240,240,0.9);
      border: 2px solid #111;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #111;
      font-weight: bold;
    }
    canvas {
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 0 3px #333;
      max-width: 100%;
      max-height: 70vh;
      display: block;
      touch-action: none;
      background: #fffef7;
    }
    .controls-hint {
      color: #444;
      font-size: 0.75rem;
      text-align: center;
      font-weight: 500;
    }
    .controls-hint kbd {
      background: #fff;
      padding: 2px 7px;
      border-radius: 4px;
      margin: 0 2px;
      font-size: 0.7rem;
      border: 2px solid #333;
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="breadcrumb">
      <a href="../../index.html">🧰 首页</a> <span class="sep">›</span>
      <a href="../index.html">🎮 游戏盒子</a> <span class="sep">›</span> 涂鸦跳跃
    </div>

    <div class="card tool-panel" style="text-align:center;padding:20px;">
      <h2 class="panel-title">🦘 涂鸦跳跃</h2>
      <p class="panel-desc">Doodle Jump · 选择角色，踩上平台一路冲天！</p>
      <div class="game-wrapper">
        <div class="game-header">
          <div class="stats">
            <div class="stat-item">🏆 <span id="scoreDisplay">0</span></div>
            <div class="stat-item">🪙 <span id="coinDisplay">0</span></div>
            <div class="stat-item">💎 <span id="shardDisplay">0</span></div>
          </div>
          <div class="best-score">👑 最高: <span id="bestScoreDisplay">0</span></div>
          <div id="buffBar" class="buff-indicator" style="display: none;">⚡ 加速中 <span id="buffTimer">0</span>s</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls-hint">
          <kbd>←</kbd><kbd>→</kbd> 或 <kbd>A</kbd><kbd>D</kbd> 移动 · 移动端触摸左右半屏
        </div>
      </div>
    </div>

    <div class="ad-unit ad-leaderboard">
      <span>📢 广告位</span>
    </div>

    <div class="card" style="margin-top:20px;">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:10px;">🎮 更多游戏</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:5px;">
        <a href="../doodle-jump/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🦘</span> 涂鸦跳跃</a>
        <a href="../tetris/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>🧱</span> 俄罗斯方块</a>
        <a href="../survivor/index.html" style="padding:6px 10px;border-radius:6px;font-size:0.78rem;color:var(--text);text-decoration:none;background:#f8fafc;border:1px solid var(--border);transition:var(--transition);display:flex;align-items:center;gap:4px;"><span>⚔️</span> 消消幸存者</a>
      </div>
    </div>
  </div>

  <script src="../../assets/js/common.js"></script>
  <script>
    (function() {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      // roundRect polyfill
      if (!ctx.roundRect) {
        ctx.roundRect = function(x, y, w, h, r) {
          if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
          ctx.beginPath();
          ctx.moveTo(x + r.tl, y);
          ctx.lineTo(x + w - r.tr, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
          ctx.lineTo(x + w, y + h - r.br);
          ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
          ctx.lineTo(x + r.bl, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
          ctx.lineTo(x, y + r.tl);
          ctx.quadraticCurveTo(x, y, x + r.tl, y);
          ctx.closePath();
        };
      }

      const WIDTH = 420;
      const HEIGHT = 680;
      canvas.width = WIDTH;
      canvas.height = HEIGHT;

      const scoreDisplay = document.getElementById('scoreDisplay');
      const coinDisplay = document.getElementById('coinDisplay');
      const shardDisplay = document.getElementById('shardDisplay');
      const bestScoreDisplay = document.getElementById('bestScoreDisplay');
      const buffBar = document.getElementById('buffBar');
      const buffTimerSpan = document.getElementById('buffTimer');

      const STATE = { MENU: 'menu', PLAYING: 'playing', GAMEOVER: 'gameover' };
      let gameState = STATE.MENU;
      let score = 0;
      let bestScore = 0;
      let cameraY = 0;
      let highestReachedY = 0;

      let coins = 0;
      let skinShards = 0;
      let activeSpeedBoost = false;
      let speedBoostTimer = 0;
      let nextRewardTime = 0;
      const REWARD_INTERVAL_MIN = 5000;
      const REWARD_INTERVAL_MAX = 10000;

      let fallTimer = 0;
      const MAX_FALL_TIME = 2.0;

      let collectibles = [];
      const MAX_PLATFORMS = 45;
      const MAX_PARTICLES = 100;

      const CHARACTERS = [
        {
          name: '经典蜥蜴',
          id: 'lizard',
          draw: function(ctx, player, inputDir) {
            const w = player.width, h = player.height;
            const antDir = inputDir !== 0 ? inputDir * 0.5 : (player.facingRight ? 0.3 : -0.3);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5;
            for (let side = -1; side <= 1; side += 2) {
              ctx.beginPath();
              const bx = side * 8, by = -h/2 + 4;
              ctx.moveTo(bx, by);
              const tx = bx + side * 8 + antDir * 8, ty = by - 16;
              ctx.quadraticCurveTo(bx + side * 5, by - 10, tx, ty);
              ctx.stroke();
              ctx.fillStyle = '#ddd'; ctx.strokeStyle = '#111';
              ctx.beginPath(); ctx.arc(tx, ty, 3.5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            }
            ctx.fillStyle = '#f0f0f0'; ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.ellipse(0, 2, w/2-1, h/2-3, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            const eyeY = -h/6;
            for (let side = -1; side <= 1; side += 2) {
              const ex = side * 9;
              ctx.fillStyle = '#fff'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
              ctx.beginPath(); ctx.arc(ex, eyeY, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
              ctx.fillStyle = '#111';
              ctx.beginPath(); ctx.arc(ex + inputDir*2 + (player.facingRight?1:-1), eyeY+1, 3.5, 0, Math.PI*2); ctx.fill();
            }
            const footY = h/2 - 5;
            for (let side = -1; side <= 1; side += 2) {
              ctx.fillStyle = '#ddd'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
              ctx.beginPath(); ctx.ellipse(side*10, footY, 7, 4.5, 0.2*side, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            }
          }
        },
        {
          name: '探险家',
          id: 'explorer',
          draw: function(ctx, player, inputDir) {
            const w = player.width, h = player.height;
            ctx.fillStyle = '#ccc'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.ellipse(0, -h/2-5, w/3, 8, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#bbb';
            ctx.beginPath(); ctx.ellipse(0, -h/2-12, w/4, 10, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#f0f0f0'; ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.ellipse(0, 2, w/2-1, h/2-3, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(-10, -h/4); ctx.lineTo(-14, h/4); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(10, -h/4); ctx.lineTo(14, h/4); ctx.stroke();
            const eyeY = -h/6;
            for (let side = -1; side <= 1; side += 2) {
              const ex = side * 9;
              ctx.fillStyle = '#fff'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
              ctx.beginPath(); ctx.arc(ex, eyeY, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
              ctx.fillStyle = '#111';
              ctx.beginPath(); ctx.arc(ex + inputDir*2 + (player.facingRight?1:-1), eyeY+1, 3.5, 0, Math.PI*2); ctx.fill();
            }
            const footY = h/2 - 5;
            for (let side = -1; side <= 1; side += 2) {
              ctx.fillStyle = '#ddd'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
              ctx.beginPath(); ctx.ellipse(side*10, footY, 7, 4.5, 0.2*side, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            }
          }
        },
        {
          name: '小飞龙',
          id: 'dragon',
          draw: function(ctx, player, inputDir) {
            const w = player.width, h = player.height;
            ctx.fillStyle = '#ddd'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
            for (let side = -1; side <= 1; side += 2) {
              ctx.beginPath();
              ctx.moveTo(side*12, -h/3);
              ctx.quadraticCurveTo(side*25, -h/2, side*30, -h/3-5);
              ctx.quadraticCurveTo(side*15, -h/4, side*12, -h/6);
              ctx.fill(); ctx.stroke();
            }
            ctx.fillStyle = '#f0f0f0'; ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.ellipse(0, 2, w/2-1, h/2-3, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            const eyeY = -h/6;
            for (let side = -1; side <= 1; side += 2) {
              const ex = side * 9;
              ctx.fillStyle = '#fff'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
              ctx.beginPath(); ctx.arc(ex, eyeY, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
              ctx.fillStyle = '#111';
              ctx.beginPath(); ctx.arc(ex + inputDir*2 + (player.facingRight?1:-1), eyeY+1, 3.5, 0, Math.PI*2); ctx.fill();
            }
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(0, h/3); ctx.quadraticCurveTo(15, h/2+5, 22, h/2-2); ctx.stroke();
            const footY = h/2 - 5;
            for (let side = -1; side <= 1; side += 2) {
              ctx.fillStyle = '#ddd'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
              ctx.beginPath(); ctx.ellipse(side*10, footY, 7, 4.5, 0.2*side, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            }
          }
        },
        {
          name: '兔耳',
          id: 'bunny',
          draw: function(ctx, player, inputDir) {
            const w = player.width, h = player.height;
            ctx.fillStyle = '#f0f0f0'; ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5;
            for (let side = -1; side <= 1; side += 2) {
              ctx.beginPath(); ctx.ellipse(side*8, -h/2-10, 7, 16, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
              ctx.fillStyle = '#ddd'; ctx.beginPath(); ctx.ellipse(side*8, -h/2-10, 4, 10, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
              ctx.fillStyle = '#f0f0f0';
            }
            ctx.fillStyle = '#f0f0f0'; ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.ellipse(0, 2, w/2-1, h/2-3, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            const eyeY = -h/6;
            for (let side = -1; side <= 1; side += 2) {
              const ex = side * 9;
              ctx.fillStyle = '#fff'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
              ctx.beginPath(); ctx.arc(ex, eyeY, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
              ctx.fillStyle = '#111';
              ctx.beginPath(); ctx.arc(ex + inputDir*2 + (player.facingRight?1:-1), eyeY+1, 3.5, 0, Math.PI*2); ctx.fill();
            }
            const footY = h/2 - 5;
            for (let side = -1; side <= 1; side += 2) {
              ctx.fillStyle = '#ddd'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
              ctx.beginPath(); ctx.ellipse(side*10, footY, 7, 4.5, 0.2*side, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            }
          }
        }
      ];

      let selectedCharacter = CHARACTERS[0];

      try {
        const saved = localStorage.getItem('doodleJumpBestScore');
        if (saved) bestScore = parseInt(saved, 10) || 0;
      } catch(e) { bestScore = 0; }
      bestScoreDisplay.textContent = bestScore;

      function saveBestScore() {
        if (score > bestScore) {
          bestScore = score;
          bestScoreDisplay.textContent = bestScore;
          try { localStorage.setItem('doodleJumpBestScore', bestScore); } catch(e) {}
        }
      }

      const keys = {};
      let inputDirection = 0;

      window.addEventListener('keydown', (e) => {
        keys[e.key] = true;
        updateInputDirection();
        if (e.key === ' ' || e.key === 'ArrowUp') {
          e.preventDefault();
          if (gameState === STATE.MENU) startGame();
          if (gameState === STATE.GAMEOVER) restartGame();
        }
        if (['ArrowLeft','ArrowRight','a','d','A','D'].includes(e.key)) e.preventDefault();
      });
      window.addEventListener('keyup', (e) => {
        keys[e.key] = false;
        updateInputDirection();
      });
      function updateInputDirection() {
        const left = keys['ArrowLeft'] || keys['a'] || keys['A'];
        const right = keys['ArrowRight'] || keys['d'] || keys['D'];
        if (left && !right) inputDirection = -1;
        else if (right && !left) inputDirection = 1;
        else inputDirection = 0;
      }

      let touchActive = false, touchX = 0;
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (gameState === STATE.MENU) {
          const rect = canvas.getBoundingClientRect();
          const scaleX = WIDTH / rect.width;
          const scaleY = HEIGHT / rect.height;
          const tx = (e.touches[0].clientX - rect.left) * scaleX;
          const ty = (e.touches[0].clientY - rect.top) * scaleY;
          handleMenuClick(tx, ty);
          return;
        }
        if (gameState === STATE.GAMEOVER) restartGame();
        touchActive = true;
        const rect = canvas.getBoundingClientRect();
        touchX = e.touches[0].clientX - rect.left;
        const scaleX = WIDTH / rect.width;
        touchX *= scaleX;
        updateTouchDirection();
      }, { passive: false });
      canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!touchActive) return;
        const rect = canvas.getBoundingClientRect();
        touchX = e.touches[0].clientX - rect.left;
        const scaleX = WIDTH / rect.width;
        touchX *= scaleX;
        updateTouchDirection();
      }, { passive: false });
      canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        touchActive = false;
        inputDirection = 0;
      });
      canvas.addEventListener('touchcancel', () => { touchActive = false; inputDirection = 0; });
      canvas.addEventListener('click', (e) => {
        if (gameState === STATE.MENU) {
          const rect = canvas.getBoundingClientRect();
          const scaleX = WIDTH / rect.width;
          const scaleY = HEIGHT / rect.height;
          const mx = (e.clientX - rect.left) * scaleX;
          const my = (e.clientY - rect.top) * scaleY;
          handleMenuClick(mx, my);
        } else if (gameState === STATE.GAMEOVER) {
          restartGame();
        }
      });

      function handleMenuClick(mx, my) {
        const iconSize = 50;
        const startX = WIDTH/2 - (CHARACTERS.length * (iconSize+15))/2 + 15;
        const yPos = HEIGHT * 0.68;
        for (let i = 0; i < CHARACTERS.length; i++) {
          const cx = startX + i * (iconSize+15);
          if (mx > cx - iconSize/2 && mx < cx + iconSize/2 && my > yPos - iconSize/2 && my < yPos + iconSize/2) {
            selectedCharacter = CHARACTERS[i];
            return;
          }
        }
        startGame();
      }

      function updateTouchDirection() {
        if (!touchActive) return;
        if (touchX < WIDTH/3) inputDirection = -1;
        else if (touchX > WIDTH*2/3) inputDirection = 1;
        else inputDirection = 0;
      }

      const player = {
        x: WIDTH/2, y: HEIGHT-200, width: 44, height: 50,
        vy: 0, vx: 0, moveSpeed: 5.5, jumpSpeed: -13.2, gravity: 0.55,
        onPlatform: null, facingRight: true, squashTimer: 0,
        trailPositions: [], jetpackActive: false, jetpackTimer: 0, jetpackFuel: 0,
        speedBoostMultiplier: 1.0,
      };

      function resetPlayer() {
        player.x = WIDTH/2; player.y = HEIGHT-200; player.vy = 0; player.vx = 0;
        player.onPlatform = null; player.facingRight = true; player.squashTimer = 0;
        player.trailPositions = []; player.jetpackActive = false; player.jetpackTimer = 0;
        player.jetpackFuel = 0; player.speedBoostMultiplier = 1.0;
      }

      const PLATFORM_TYPES = {
        NORMAL: { name:'normal', fill:'#ddd', stroke:'#222', bounceMultiplier:1, points:10 },
        MOVING: { name:'moving', fill:'#ccc', stroke:'#222', bounceMultiplier:1, points:15, moving:true },
        FRAGILE: { name:'fragile', fill:'#e0e0e0', stroke:'#222', bounceMultiplier:1, points:20, fragile:true },
        SPRING: { name:'spring', fill:'#bbb', stroke:'#111', bounceMultiplier:1.45, points:25, hasSpring:true },
        JETPACK: { name:'jetpack', fill:'#c0c0c0', stroke:'#111', bounceMultiplier:1, points:30, hasJetpack:true },
      };

      let platforms = [];

      function createPlatform(x, y, typeKey='NORMAL') {
        const typeDef = PLATFORM_TYPES[typeKey];
        const width = 60 + Math.random() * 25;
        return {
          x, y, width, height: 14, type: typeKey, typeDef, broken: false,
          moveCenterX: x, moveAmplitude: 45 + Math.random() * 65,
          moveSpeed: (0.5 + Math.random() * 1.3) * (Math.random()>0.5?1:-1),
          movePhase: Math.random() * Math.PI*2,
          springCompressed: false, springTimer: 0,
          jetpackCollected: false, particles: [], flashTimer: 0,
        };
      }

      function generateInitialPlatforms() {
        platforms = [];
        const startPlat = createPlatform(player.x-35, player.y + player.height/2 + 5, 'NORMAL');
        startPlat.width = 80; startPlat.x = player.x-40;
        platforms.push(startPlat);
        let currentY = startPlat.y - 55;
        for (let i=0; i<20; i++) {
          const gap = 50 + Math.random() * 45;
          currentY -= gap;
          const px = 25 + Math.random() * (WIDTH-110);
          let typeKey = 'NORMAL';
          const heightFromStart = startPlat.y - currentY;
          const rand = Math.random();
          if (heightFromStart > 600) {
            if (rand<0.35) typeKey='NORMAL'; else if (rand<0.55) typeKey='MOVING';
            else if (rand<0.75) typeKey='FRAGILE'; else if (rand<0.92) typeKey='SPRING'; else typeKey='JETPACK';
          } else if (heightFromStart > 300) {
            if (rand<0.50) typeKey='NORMAL'; else if (rand<0.70) typeKey='MOVING';
            else if (rand<0.85) typeKey='FRAGILE'; else if (rand<0.95) typeKey='SPRING'; else typeKey='JETPACK';
          } else {
            if (rand<0.65) typeKey='NORMAL'; else if (rand<0.80) typeKey='MOVING';
            else if (rand<0.92) typeKey='FRAGILE'; else typeKey='SPRING';
          }
          platforms.push(createPlatform(px, currentY, typeKey));
        }
      }

      function ensurePlatformsAbove() {
        while (platforms.length > MAX_PLATFORMS) {
          let maxY = -Infinity, maxIdx = 0;
          platforms.forEach((p, idx) => { if (p.y > maxY) { maxY = p.y; maxIdx = idx; } });
          platforms.splice(maxIdx, 1);
        }
        let minY = Infinity;
        for (const p of platforms) if (!p.broken && p.y < minY) minY = p.y;
        const topEdge = cameraY - 150;
        while (minY > topEdge && platforms.length < MAX_PLATFORMS) {
          const gap = 50 + Math.random() * 45;
          const newY = minY - gap;
          const px = 25 + Math.random() * (WIDTH-110);
          const heightFactor = Math.abs(newY)/3000;
          let typeKey = 'NORMAL';
          const rand = Math.random();
          if (heightFactor>0.6) {
            if (rand<0.25) typeKey='NORMAL'; else if (rand<0.48) typeKey='MOVING';
            else if (rand<0.70) typeKey='FRAGILE'; else if (rand<0.90) typeKey='SPRING'; else typeKey='JETPACK';
          } else if (heightFactor>0.3) {
            if (rand<0.40) typeKey='NORMAL'; else if (rand<0.60) typeKey='MOVING';
            else if (rand<0.78) typeKey='FRAGILE'; else if (rand<0.93) typeKey='SPRING'; else typeKey='JETPACK';
          } else {
            if (rand<0.55) typeKey='NORMAL'; else if (rand<0.73) typeKey='MOVING';
            else if (rand<0.88) typeKey='FRAGILE'; else typeKey='SPRING';
          }
          platforms.push(createPlatform(px, newY, typeKey));
          minY = newY;
        }
      }

      let particles = [];
      function spawnParticles(x,y,color='#555',count=8,spread=2.5) {
        for (let i=0;i<count && particles.length < MAX_PARTICLES;i++) {
          const angle = -Math.PI/2 + (Math.random()-0.5)*Math.PI;
          const speed = 1.5 + Math.random()*spread;
          particles.push({ x,y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed, life:1, decay:0.03+Math.random()*0.06, size:2+Math.random()*3, color });
        }
      }
      function spawnFragileBreakParticles(x,y) {
        const colors = ['#555','#666','#777'];
        for (let i=0;i<12 && particles.length < MAX_PARTICLES;i++) {
          const angle = Math.random()*Math.PI*2;
          const speed = 2+Math.random()*5;
          particles.push({ x:x+(Math.random()-0.5)*50, y:y+(Math.random()-0.5)*8, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-2, life:1, decay:0.02+Math.random()*0.05, size:3+Math.random()*5, color:colors[Math.floor(Math.random()*colors.length)], isFragment:true, rotation:Math.random()*Math.PI*2, rotSpeed:(Math.random()-0.5)*0.3 });
        }
      }
      function updateParticles() {
        for (const p of particles) {
          p.x += p.vx; p.y += p.vy;
          if (!p.isFragment) p.vy += 0.1; else p.vy += 0.25;
          p.life -= p.decay;
          if (p.rotSpeed) p.rotation += p.rotSpeed;
        }
        particles = particles.filter(p=>p.life>0);
      }

      function spawnCollectible() {
        const types = ['coin', 'buff', 'shard', 'speed', 'effect'];
        const type = types[Math.floor(Math.random() * types.length)];
        const x = 40 + Math.random() * (WIDTH - 80);
        const y = cameraY - 40 - Math.random() * 30;
        let icon;
        switch(type) {
          case 'coin': icon = '🪙'; break;
          case 'buff': icon = '✨'; break;
          case 'shard': icon = '💎'; break;
          case 'speed': icon = '⚡'; break;
          case 'effect': icon = '🌟'; break;
        }
        collectibles.push({ x, y, type, icon, radius: 18, collected: false, animScale: 1 });
      }

      function collectItem(item) {
        if (item.collected) return;
        item.collected = true;
        anime({
          targets: item,
          animScale: [1, 1.8, 1],
          duration: 400,
          easing: 'easeOutElastic(1, .5)',
          complete: () => { collectibles = collectibles.filter(c => c !== item); }
        });
        switch(item.type) {
          case 'coin': coins++; score += 15; spawnParticles(item.x, item.y, '#333'); break;
          case 'buff': player.vy = player.jumpSpeed * 1.6; spawnParticles(item.x, item.y, '#555', 10); score += 20; break;
          case 'shard': skinShards++; score += 25; spawnParticles(item.x, item.y, '#666', 8); break;
          case 'speed': activeSpeedBoost = true; speedBoostTimer = 5.0; player.speedBoostMultiplier = 2.0; spawnParticles(item.x, item.y, '#222', 12); score += 10; break;
          case 'effect':
            for (let i=0;i<20 && particles.length < MAX_PARTICLES;i++) {
              particles.push({ x: item.x, y: item.y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.8)*6 - 2, life:1, decay:0.03+Math.random()*0.05, size:3+Math.random()*6, color: '#444' });
            }
            score += 5; break;
        }
      }

      function updateRewardTimer(dt) {
        if (gameState !== STATE.PLAYING) return;
        nextRewardTime -= dt * 1000;
        if (nextRewardTime <= 0) {
          if (collectibles.length < 3) spawnCollectible();
          nextRewardTime = REWARD_INTERVAL_MIN + Math.random() * (REWARD_INTERVAL_MAX - REWARD_INTERVAL_MIN);
        }
      }

      function updateSpeedBoost(dt) {
        if (activeSpeedBoost && speedBoostTimer > 0) {
          speedBoostTimer -= dt;
          if (speedBoostTimer <= 0) { activeSpeedBoost = false; player.speedBoostMultiplier = 1.0; }
        }
      }

      function updateCollectibles() {
        for (const c of collectibles) { if (!c.collected) c.y += 0.6; }
        collectibles = collectibles.filter(c => c.y < cameraY + HEIGHT + 50 || c.collected);
      }

      function updateCamera() {
        cameraY = player.y - HEIGHT * 0.35;
      }

      function checkPlatformCollision() {
        if (player.vy < 0) { player.onPlatform = null; return false; }
        const playerBottom = player.y + player.height/2;
        const playerLeft = player.x - player.width/2;
        const playerRight = player.x + player.width/2;
        const prevBottom = playerBottom - player.vy;
        let bestPlatform = null, bestY = Infinity;
        for (const p of platforms) {
          if (p.broken) continue;
          const platTop = p.y - p.height/2;
          const platLeft = p.x - p.width/2, platRight = p.x + p.width/2;
          if (playerRight > platLeft-8 && playerLeft < platRight+8 &&
              playerBottom >= platTop-4 && prevBottom <= platTop+6 && playerBottom <= platTop+18) {
            if (platTop < bestY) { bestY = platTop; bestPlatform = p; }
          }
        }
        if (bestPlatform) {
          player.y = bestY - player.height/2;
          player.onPlatform = bestPlatform;
          if (bestPlatform.typeDef.hasSpring) {
            player.vy = player.jumpSpeed * 1.45;
            bestPlatform.springCompressed = true; bestPlatform.springTimer = 0.2;
            spawnParticles(player.x, bestY, '#222', 10);
            score += 25;
          } else if (bestPlatform.typeDef.hasJetpack && !bestPlatform.jetpackCollected) {
            player.vy = player.jumpSpeed;
            bestPlatform.jetpackCollected = true;
            player.jetpackActive = true; player.jetpackTimer = 2.5; player.jetpackFuel = 1.2;
            spawnParticles(player.x, bestY, '#111', 15);
            score += 30;
          } else if (bestPlatform.typeDef.fragile) {
            player.vy = player.jumpSpeed;
            bestPlatform.broken = true; bestPlatform.flashTimer = 0.15;
            spawnFragileBreakParticles(bestPlatform.x, bestPlatform.y);
            spawnParticles(player.x, bestY, '#666', 6);
            score += 20;
            player.onPlatform = null;
          } else {
            player.vy = player.jumpSpeed;
            spawnParticles(player.x, bestY, '#444', 5);
            score += bestPlatform.typeDef.points || 10;
          }
          player.squashTimer = 0.15;
          fallTimer = 0;
          return true;
        }
        player.onPlatform = null;
        return false;
      }

      function checkCollectibleCollision() {
        for (const c of collectibles) {
          if (c.collected) continue;
          const dx = player.x - c.x;
          const dy = (player.y - player.height/4) - c.y;
          if (Math.sqrt(dx*dx+dy*dy) < player.width/2 + c.radius) collectItem(c);
        }
      }

      function updateMovingPlatforms(dt) {
        for (const p of platforms) {
          if (p.broken || !p.typeDef.moving) continue;
          p.movePhase += p.moveSpeed * dt * 3;
          const offset = Math.sin(p.movePhase) * p.moveAmplitude;
          const dx = (p.moveCenterX + offset) - p.x;
          p.x = p.moveCenterX + offset;
          if (player.onPlatform === p && player.vy >= -1) player.x += dx;
        }
      }

      function updatePlatformAnimations(dt) {
        for (const p of platforms) {
          if (p.springTimer>0) p.springTimer -= dt;
          if (p.flashTimer>0) p.flashTimer -= dt;
        }
      }

      function updateJetpack(dt) {
        if (player.jetpackActive && player.jetpackTimer>0) {
          player.jetpackTimer -= dt;
          if (player.jetpackFuel>0) { player.vy = -10; player.jetpackFuel -= dt; }
          else player.jetpackActive = false;
        } else { player.jetpackActive = false; player.jetpackFuel = 0; }
      }

      let lastTime = performance.now();
      function update() {
        if (gameState !== STATE.PLAYING) return;

        const now = performance.now();
        let dt = (now - lastTime) / 1000;
        if (dt > 0.1) dt = 0.1;
        lastTime = now;

        updateRewardTimer(dt);
        updateSpeedBoost(dt);
        updateJetpack(dt);

        const targetVx = inputDirection * player.moveSpeed * player.speedBoostMultiplier;
        player.vx += (targetVx - player.vx) * Math.min(1, dt * 18);
        player.x += player.vx * dt * 60;

        if (player.x < -player.width/2) player.x = WIDTH + player.width/2 - 2;
        else if (player.x > WIDTH + player.width/2) player.x = -player.width/2 + 2;

        if (!player.jetpackActive || player.jetpackFuel<=0) player.vy += player.gravity * dt * 60;
        if (player.vy > 16) player.vy = 16;
        player.y += player.vy * dt * 60;

        updateMovingPlatforms(dt);
        checkPlatformCollision();
        checkCollectibleCollision();
        updatePlatformAnimations(dt);
        updateCamera();
        ensurePlatformsAbove();

        if (player.vy > 0 && !player.onPlatform) fallTimer += dt;
        if (fallTimer >= MAX_FALL_TIME) { endGame(); return; }

        if (player.y < highestReachedY) highestReachedY = player.y;
        const heightScore = Math.floor(Math.max(0, (-highestReachedY + HEIGHT-200) / 15));
        if (heightScore > score) score = heightScore;

        if (player.vy < -3 || player.jetpackActive)
          player.trailPositions.push({ x:player.x, y:player.y, life:1 });
        for (const t of player.trailPositions) t.life -= dt * 3;
        player.trailPositions = player.trailPositions.filter(t=>t.life>0);
        if (player.trailPositions.length>15) player.trailPositions.shift();

        updateParticles();
        updateCollectibles();
        for (const p of platforms) {
          if (p.particles.length>0) {
            for (const pp of p.particles) { pp.x+=pp.vx; pp.y+=pp.vy; pp.vy+=0.3; pp.life-=pp.decay||0.04; }
            p.particles = p.particles.filter(pp=>pp.life>0);
          }
        }
        if (player.squashTimer>0) player.squashTimer -= dt;

        scoreDisplay.textContent = score;
        coinDisplay.textContent = coins;
        shardDisplay.textContent = skinShards;
        if (activeSpeedBoost && speedBoostTimer > 0) {
          buffBar.style.display = 'flex';
          buffTimerSpan.textContent = Math.ceil(speedBoostTimer);
        } else buffBar.style.display = 'none';

        if (player.y > cameraY + HEIGHT + 60) endGame();
      }

      function endGame() {
        if (gameState !== STATE.PLAYING) return;
        gameState = STATE.GAMEOVER;
        saveBestScore();
        spawnParticles(player.x, player.y, '#111', 20);
        player.vy = 0; player.vx = 0;
      }

      function startGame() {
        gameState = STATE.PLAYING;
        score = 0; coins = 0; skinShards = 0;
        resetPlayer();
        platforms = []; particles = []; collectibles = [];
        activeSpeedBoost = false; speedBoostTimer = 0;
        fallTimer = 0;
        nextRewardTime = REWARD_INTERVAL_MIN + Math.random()*(REWARD_INTERVAL_MAX-REWARD_INTERVAL_MIN);
        generateInitialPlatforms();
        if (platforms.length>0) {
          const sp = platforms[0];
          player.x = sp.x; player.y = sp.y - sp.height/2 - player.height/2;
          player.vy = 0; player.onPlatform = sp;
        }
        cameraY = player.y - HEIGHT * 0.35;
        highestReachedY = player.y;
        lastTime = performance.now();
        scoreDisplay.textContent = '0';
        coinDisplay.textContent = '0';
        shardDisplay.textContent = '0';
        buffBar.style.display = 'none';
      }

      function restartGame() { startGame(); }

      // ---------- 渲染 ----------
      function drawBackground() {
        ctx.fillStyle = '#fdfaf2'; ctx.fillRect(0,0,WIDTH,HEIGHT);
        ctx.strokeStyle = '#d5d0c5'; ctx.lineWidth = 0.5;
        for (let i=0;i<WIDTH;i+=80){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,HEIGHT); ctx.stroke(); }
        for (let j=0;j<HEIGHT;j+=80){ ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(WIDTH,j); ctx.stroke(); }
      }
      function drawClouds(parallax, alpha) {
        ctx.save(); ctx.globalAlpha = alpha*0.3;
        const baseY = -cameraY*parallax;
        for (let i=0;i<4;i++) {
          const cx = ((i*230+100)%WIDTH), cy = ((i*280+150)%HEIGHT)+baseY;
          const adjY = ((cy%HEIGHT)+HEIGHT)%HEIGHT;
          ctx.fillStyle='#ccc'; ctx.beginPath();
          ctx.arc(cx,adjY,18,0,Math.PI*2); ctx.arc(cx-15,adjY+5,14,0,Math.PI*2); ctx.arc(cx+15,adjY+3,16,0,Math.PI*2);
          ctx.fill(); ctx.strokeStyle='#999'; ctx.lineWidth=1; ctx.stroke();
        }
        ctx.restore();
      }
      function drawPlatforms() {
        for (const p of platforms) {
          if (p.broken && p.flashTimer<=0 && p.particles.length===0) continue;
          const sy = p.y - cameraY; if (sy<-40||sy>HEIGHT+40) continue;
          ctx.save(); const alpha = p.flashTimer>0 ? Math.min(1,p.flashTimer/0.15)*0.7 : 1; ctx.globalAlpha=alpha;
          const px=p.x, py=sy, pw=p.width, ph=p.height;
          ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.roundRect(px-pw/2+3,py-ph/2+3,pw,ph,6); ctx.fill();
          ctx.fillStyle=p.typeDef.fill; ctx.strokeStyle=p.typeDef.stroke; ctx.lineWidth=2.5;
          ctx.beginPath(); ctx.roundRect(px-pw/2,py-ph/2,pw,ph,6); ctx.fill(); ctx.stroke();
          if (p.typeDef.hasSpring && p.springTimer<=0) {
            ctx.strokeStyle='#111'; ctx.lineWidth=2; ctx.beginPath();
            ctx.moveTo(px-8,py-ph/2-6); ctx.lineTo(px+8,py-ph/2-6); ctx.lineTo(px-8,py-ph/2-1);
            ctx.lineTo(px+8,py-ph/2-1); ctx.lineTo(px-8,py-ph/2+4); ctx.lineTo(px+8,py-ph/2+4); ctx.stroke();
          }
          if (p.typeDef.hasJetpack && !p.jetpackCollected) {
            ctx.fillStyle='#444'; ctx.strokeStyle='#111'; ctx.lineWidth=2;
            drawStar(ctx, px, py-ph/2-9,5,8,4); ctx.fill(); ctx.stroke();
          }
          if (p.typeDef.fragile && !p.broken) {
            ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
            ctx.beginPath(); ctx.moveTo(px-pw/4,py-ph/2+2); ctx.lineTo(px+pw/5,py+ph/2-3);
            ctx.moveTo(px+pw/6,py-ph/2+1); ctx.lineTo(px-pw/3,py+ph/2-2); ctx.stroke(); ctx.setLineDash([]);
          }
          ctx.restore();
        }
      }
      function drawStar(context,cx,cy,outerR,innerR,points) {
        context.beginPath();
        for (let i=0;i<points*2;i++) {
          const r=i%2===0?outerR:innerR;
          const angle=(i*Math.PI)/points-Math.PI/2;
          const x=cx+Math.cos(angle)*r, y=cy+Math.sin(angle)*r;
          if(i===0) context.moveTo(x,y); else context.lineTo(x,y);
        }
        context.closePath();
      }

      function drawPlayer() {
        const sy = player.y - cameraY;
        if (sy<-80||sy>HEIGHT+100) return;
        ctx.save(); ctx.translate(player.x, sy);
        let scaleX=1, scaleY=1;
        if (player.squashTimer>0) { const t=Math.min(1,player.squashTimer/0.15); scaleX=1+t*0.25; scaleY=1-t*0.2; }
        if (player.jetpackActive&&player.jetpackFuel>0) { scaleY=1.1; scaleX=0.9; }
        ctx.scale(scaleX, scaleY);
        for (const t of player.trailPositions) {
          const ty = t.y - player.y;
          ctx.fillStyle = `rgba(80,80,80,${t.life*0.4})`;
          ctx.beginPath(); ctx.arc(t.x-player.x, ty, 2+t.life*3, 0, Math.PI*2); ctx.fill();
        }
        if (player.jetpackActive && player.jetpackFuel>0) {
          ctx.fillStyle='#444'; ctx.beginPath();
          ctx.moveTo(-12,player.height/2-2); ctx.quadraticCurveTo(-6,player.height/2+18,0,player.height/2+24);
          ctx.quadraticCurveTo(6,player.height/2+18,12,player.height/2-2); ctx.closePath(); ctx.fill();
          ctx.strokeStyle='#111'; ctx.lineWidth=2; ctx.stroke();
        }
        ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath();
        ctx.ellipse(0, player.height/2-2, player.width/2-2, 6, 0, 0, Math.PI*2); ctx.fill();
        selectedCharacter.draw(ctx, player, inputDirection);
        ctx.restore();
      }

      function drawCollectibles() {
        for (const c of collectibles) {
          if (c.collected && c.animScale===1) continue;
          const sy = c.y - cameraY; if (sy<-40||sy>HEIGHT+40) continue;
          ctx.save(); ctx.translate(c.x, sy); const scale=c.animScale||1; ctx.scale(scale,scale);
          ctx.fillStyle='#222'; ctx.strokeStyle='#111'; ctx.lineWidth=2;
          ctx.beginPath(); ctx.arc(0,0,c.radius,0,Math.PI*2); ctx.fill(); ctx.stroke();
          ctx.fillStyle='#fff'; ctx.font='16px "Segoe UI Emoji","PingFang SC"';
          ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(c.icon,0,1);
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          const sy = p.y - cameraY; if (sy<-20||sy>HEIGHT+20) continue;
          ctx.fillStyle=p.color; ctx.globalAlpha=p.life;
          if (p.isFragment) {
            ctx.save(); ctx.translate(p.x,sy); ctx.rotate(p.rotation||0);
            ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size); ctx.restore();
          } else { ctx.beginPath(); ctx.arc(p.x,sy,p.size,0,Math.PI*2); ctx.fill(); }
        }
        ctx.globalAlpha=1;
      }

      function drawUI() {
        if (gameState === STATE.MENU) {
          ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
          ctx.fillStyle = '#f0f0f0'; ctx.font = 'bold 32px "PingFang SC","Microsoft YaHei"'; ctx.textAlign='center';
          ctx.fillText('🚀 一跳冲天', WIDTH/2, HEIGHT*0.2);
          ctx.font = '16px "PingFang SC"';
          ctx.fillText('选择角色 (点击图标)', WIDTH/2, HEIGHT*0.55);
          const iconSize = 50, startX = WIDTH/2 - (CHARACTERS.length*(iconSize+15))/2 + 15, yPos = HEIGHT*0.68;
          for (let i=0; i<CHARACTERS.length; i++) {
            const cx = startX + i*(iconSize+15);
            ctx.fillStyle = '#fff'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(cx-iconSize/2, yPos-iconSize/2, iconSize, iconSize, 8); ctx.fill(); ctx.stroke();
            if (selectedCharacter === CHARACTERS[i]) {
              ctx.strokeStyle = '#ff0'; ctx.lineWidth = 3;
              ctx.beginPath(); ctx.roundRect(cx-iconSize/2-2, yPos-iconSize/2-2, iconSize+4, iconSize+4, 10); ctx.stroke();
            }
            ctx.save(); ctx.translate(cx, yPos);
            CHARACTERS[i].draw(ctx, {width:30,height:34,facingRight:true}, 0);
            ctx.restore();
            ctx.fillStyle = '#111'; ctx.font = '10px "PingFang SC"'; ctx.textAlign='center';
            ctx.fillText(CHARACTERS[i].name, cx, yPos+iconSize/2+12);
          }
          ctx.fillStyle = '#f0f0f0'; ctx.font = '14px "PingFang SC"';
          ctx.fillText('点击空白处或按空格开始', WIDTH/2, HEIGHT*0.88);
        }
        if (gameState === STATE.GAMEOVER) {
          ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
          ctx.fillStyle='#fff'; ctx.font='bold 28px "PingFang SC"'; ctx.textAlign='center';
          ctx.fillText('游戏结束',WIDTH/2,HEIGHT*0.33);
          ctx.font='18px "PingFang SC"';
          ctx.fillText(`得分: ${score}   🪙${coins}   💎${skinShards}`,WIDTH/2,HEIGHT*0.45);
          ctx.fillText(`最高分: ${bestScore}`,WIDTH/2,HEIGHT*0.52);
          ctx.fillText('点击重新开始',WIDTH/2,HEIGHT*0.62);
        }
      }

      function render() {
        ctx.clearRect(0,0,WIDTH,HEIGHT);
        drawBackground();
        if (gameState === STATE.PLAYING) {
          drawClouds(0.15,0.5); drawClouds(0.35,0.3);
          drawPlatforms();
          drawCollectibles();
          drawParticles();
          drawPlayer();
        }
        drawUI();
      }

      function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
      }

      function init() {
        resetPlayer();
        platforms=[]; particles=[]; collectibles=[];
        cameraY=0; highestReachedY=HEIGHT-200;
        score=0; coins=0; skinShards=0; fallTimer=0;
        gameState=STATE.MENU;
        generateInitialPlatforms();
        if (platforms.length>0) {
          const sp=platforms[0];
          player.x=sp.x; player.y=sp.y-sp.height/2-player.height/2; player.vy=0; player.onPlatform=sp;
        }
        nextRewardTime=0; activeSpeedBoost=false; speedBoostTimer=0;
        lastTime=performance.now();
      }
      init();
      gameLoop();
    })();
  </script>
</body>
